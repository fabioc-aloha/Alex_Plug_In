<svg xmlns="http://www.w3.org/2000/svg" viewBox="6 6 116 116" width="128" height="128">

    <defs>
        <linearGradient id="rocketBodystates_reviewing" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#38bdf8"/>
            <stop offset="100%" stop-color="#0284c7"/>
        </linearGradient>
        <linearGradient id="flameGradstates_reviewing" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#fdba74"/>
            <stop offset="100%" stop-color="#f97316"/>
        </linearGradient>
    </defs>
<filter id="pop_states_reviewing" x="-5%" y="-5%" width="110%" height="110%">
    <feMorphology in="SourceAlpha" operator="dilate" radius="1.5" result="expanded"/>
    <feFlood flood-color="#0a0e1a" result="dark"/>
    <feComposite in="dark" in2="expanded" operator="in" result="outline"/>
    <feMerge>
        <feMergeNode in="outline"/>
        <feMergeNode in="SourceGraphic"/>
    </feMerge>
</filter>
<g filter="url(#pop_states_reviewing)">
<g transform="rotate(-10, 64, 64)">

    <g transform="translate(64,64) rotate(30) translate(-64,-64)">
        <!-- Rocket body -->
        <path d="M64,14 C64,14 48,28 48,52 L48,80 L54,84 L54,76 L74,76 L74,84 L80,80 L80,52 C80,28 64,14 64,14 Z" 
              fill="url(#rocketBodystates_reviewing)" />
        <!-- Left fin -->
        <polygon points="48,68 34,88 48,80" fill="url(#rocketBodystates_reviewing)" />
        <!-- Right fin -->
        <polygon points="80,68 94,88 80,80" fill="url(#rocketBodystates_reviewing)" />
        <!-- A cutout (negative space) -->
        <path d="M64,26 L55,62 L58,62 L61,52 L67,52 L70,62 L73,62 Z M62.5,47 L64,36 L65.5,47 Z" 
              fill="#ffffff" />
        <!-- Exhaust flame -->
        <polygon points="54,82 64,98 74,82" fill="url(#flameGradstates_reviewing)" />
    </g>

    <g transform="translate(64,64) rotate(30) translate(-64,-64)">
        <!-- Bold reading glasses -->
        <circle cx="56" cy="38" r="6" fill="none" stroke="#0d9488" stroke-width="2.5"/>
        <circle cx="72" cy="38" r="6" fill="none" stroke="#0d9488" stroke-width="2.5"/>
        <line x1="62" y1="38" x2="66" y2="38" stroke="#0d9488" stroke-width="2"/>
        <line x1="50" y1="38" x2="44" y2="35" stroke="#0d9488" stroke-width="2" stroke-linecap="round"/>
        <line x1="78" y1="38" x2="84" y2="35" stroke="#0d9488" stroke-width="2" stroke-linecap="round"/>
        <!-- Lens glint -->
        <circle cx="54" cy="36" r="1.5" fill="#ffffff" opacity="0.3"/>
        <circle cx="70" cy="36" r="1.5" fill="#ffffff" opacity="0.3"/>
    </g>
    <!-- Large checklist clipboard — fills right side -->
    <g transform="translate(74, 34)">
        <rect x="0" y="0" width="34" height="48" rx="3" fill="#0d9488" opacity="0.3" stroke="#0d9488" stroke-width="2"/>
        <rect x="9" y="-4" width="16" height="6" rx="2.5" fill="#0d9488" opacity="0.85"/>
        <!-- Check 1 -->
        <polyline points="4,10 8,14 15,6" stroke="#0d9488" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>
        <line x1="18" y1="10" x2="30" y2="10" stroke="#0d9488" stroke-width="1.5" opacity="0.5"/>
        <!-- Check 2 -->
        <polyline points="4,22 8,26 15,18" stroke="#0d9488" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>
        <line x1="18" y1="22" x2="30" y2="22" stroke="#0d9488" stroke-width="1.5" opacity="0.5"/>
        <!-- Pending 3 -->
        <rect x="4" y="32" width="9" height="6" rx="1" fill="none" stroke="#0d9488" stroke-width="1.5" opacity="0.5"/>
        <line x1="18" y1="35" x2="28" y2="35" stroke="#0d9488" stroke-width="1.5" opacity="0.4"/>
        <!-- Red pen mark -->
        <line x1="4" y1="43" x2="20" y2="43" stroke="#f43f5e" stroke-width="2" opacity="0.6" stroke-linecap="round"/>
    </g>
</g>
</g>
</svg>