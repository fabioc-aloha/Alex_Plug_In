<svg xmlns="http://www.w3.org/2000/svg" viewBox="6 6 116 116" width="128" height="128">

    <defs>
        <linearGradient id="rocketBodystates_planning" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#38bdf8"/>
            <stop offset="100%" stop-color="#0284c7"/>
        </linearGradient>
        <linearGradient id="flameGradstates_planning" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#fdba74"/>
            <stop offset="100%" stop-color="#f97316"/>
        </linearGradient>
    </defs>
<filter id="pop_states_planning" x="-5%" y="-5%" width="110%" height="110%">
    <feMorphology in="SourceAlpha" operator="dilate" radius="1.5" result="expanded"/>
    <feFlood flood-color="#0a0e1a" result="dark"/>
    <feComposite in="dark" in2="expanded" operator="in" result="outline"/>
    <feMerge>
        <feMergeNode in="outline"/>
        <feMergeNode in="SourceGraphic"/>
    </feMerge>
</filter>
<g filter="url(#pop_states_planning)">
<g transform="rotate(5, 64, 64)">

    <g transform="translate(64,64) rotate(30) translate(-64,-64)">
        <!-- Rocket body -->
        <path d="M64,14 C64,14 48,28 48,52 L48,80 L54,84 L54,76 L74,76 L74,84 L80,80 L80,52 C80,28 64,14 64,14 Z" 
              fill="url(#rocketBodystates_planning)" />
        <!-- Left fin -->
        <polygon points="48,68 34,88 48,80" fill="url(#rocketBodystates_planning)" />
        <!-- Right fin -->
        <polygon points="80,68 94,88 80,80" fill="url(#rocketBodystates_planning)" />
        <!-- A cutout (negative space) -->
        <path d="M64,26 L55,62 L58,62 L61,52 L67,52 L70,62 L73,62 Z M62.5,47 L64,36 L65.5,47 Z" 
              fill="#ffffff" />
        <!-- Exhaust flame -->
        <polygon points="54,82 64,98 74,82" fill="url(#flameGradstates_planning)" />
    </g>

    <!-- Clipboard with flowchart — foreground overlap -->
    <g transform="translate(22, 30)">
        <rect x="0" y="0" width="34" height="44" rx="3" fill="#3b82f6" opacity="0.7" stroke="#3b82f6" stroke-width="2"/>
        <!-- Clip -->
        <rect x="9" y="-4" width="16" height="6" rx="2.5" fill="#3b82f6" opacity="0.95"/>
        <!-- Start node -->
        <rect x="9" y="6" width="16" height="7" rx="2" fill="#3b82f6" opacity="0.9"/>
        <!-- Arrow down -->
        <line x1="17" y1="13" x2="17" y2="18" stroke="#3b82f6" stroke-width="2"/>
        <!-- Diamond decision -->
        <polygon points="17,18 24,23 17,28 10,23" fill="#3b82f6" opacity="0.75"/>
        <!-- Yes branch left -->
        <line x1="10" y1="23" x2="4" y2="23" stroke="#3b82f6" stroke-width="1.5"/>
        <line x1="4" y1="23" x2="4" y2="32" stroke="#3b82f6" stroke-width="1.5"/>
        <rect x="0" y="32" width="10" height="6" rx="1.5" fill="#3b82f6" opacity="0.65"/>
        <!-- No branch right -->
        <line x1="24" y1="23" x2="30" y2="23" stroke="#3b82f6" stroke-width="1.5"/>
        <line x1="30" y1="23" x2="30" y2="32" stroke="#3b82f6" stroke-width="1.5"/>
        <rect x="24" y="32" width="10" height="6" rx="1.5" fill="#3b82f6" opacity="0.65"/>
    </g>
</g>
</g>
</svg>