<svg xmlns="http://www.w3.org/2000/svg" viewBox="6 6 116 116" width="128" height="128">

    <defs>
        <linearGradient id="rocketBodypersonas_science" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#38bdf8"/>
            <stop offset="100%" stop-color="#0284c7"/>
        </linearGradient>
        <linearGradient id="flameGradpersonas_science" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#fdba74"/>
            <stop offset="100%" stop-color="#f97316"/>
        </linearGradient>
    </defs>
<filter id="pop_personas_science" x="-5%" y="-5%" width="110%" height="110%">
    <feMorphology in="SourceAlpha" operator="dilate" radius="1.5" result="expanded"/>
    <feFlood flood-color="#0a0e1a" result="dark"/>
    <feComposite in="dark" in2="expanded" operator="in" result="outline"/>
    <feMerge>
        <feMergeNode in="outline"/>
        <feMergeNode in="SourceGraphic"/>
    </feMerge>
</filter>
<g filter="url(#pop_personas_science)">
<g transform="rotate(-10, 64, 64)">

    <g transform="translate(64,64) rotate(30) translate(-64,-64)">
        <!-- Rocket body -->
        <path d="M64,14 C64,14 48,28 48,52 L48,80 L54,84 L54,76 L74,76 L74,84 L80,80 L80,52 C80,28 64,14 64,14 Z" 
              fill="url(#rocketBodypersonas_science)" />
        <!-- Left fin -->
        <polygon points="48,68 34,88 48,80" fill="url(#rocketBodypersonas_science)" />
        <!-- Right fin -->
        <polygon points="80,68 94,88 80,80" fill="url(#rocketBodypersonas_science)" />
        <!-- A cutout (negative space) -->
        <path d="M64,26 L55,62 L58,62 L61,52 L67,52 L70,62 L73,62 Z M62.5,47 L64,36 L65.5,47 Z" 
              fill="#ffffff" />
        <!-- Exhaust flame -->
        <polygon points="54,82 64,98 74,82" fill="url(#flameGradpersonas_science)" />
    </g>

    <g transform="translate(64,64) rotate(30) translate(-64,-64)">
        <!-- Goggles -->
        <rect x="52" y="33" width="12" height="10" rx="4" fill="none" stroke="#0d9488" stroke-width="2.5"/>
        <rect x="66" y="33" width="12" height="10" rx="4" fill="none" stroke="#0d9488" stroke-width="2.5"/>
        <line x1="64" y1="38" x2="66" y2="38" stroke="#0d9488" stroke-width="2"/>
        <!-- Strap -->
        <path d="M52,38 Q46,36 44,34" stroke="#0d9488" stroke-width="2" fill="none"/>
        <path d="M78,38 Q84,36 86,34" stroke="#0d9488" stroke-width="2" fill="none"/>
    </g>
    <!-- Flask — foreground overlap -->
    <g transform="translate(66, 40)">
        <path d="M8,0 L8,16 L-4,34 L24,34 L14,16 L14,0 Z" fill="#0d9488" opacity="0.85" stroke="#0d9488" stroke-width="1.5"/>
        <rect x="4" y="-5" width="16" height="6" rx="2.5" fill="#0d9488" opacity="0.8"/>
        <!-- Bubbles -->
        <circle cx="8" cy="24" r="3" fill="#ffffff" opacity="0.5"/>
        <circle cx="14" cy="18" r="2.5" fill="#ffffff" opacity="0.4"/>
        <circle cx="10" cy="12" r="2" fill="#ffffff" opacity="0.35"/>
    </g>
</g>
</g>
</svg>