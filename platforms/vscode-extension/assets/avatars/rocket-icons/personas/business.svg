<svg xmlns="http://www.w3.org/2000/svg" viewBox="6 6 116 116" width="128" height="128">

    <defs>
        <linearGradient id="rocketBodypersonas_business" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#38bdf8"/>
            <stop offset="100%" stop-color="#0284c7"/>
        </linearGradient>
        <linearGradient id="flameGradpersonas_business" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#fdba74"/>
            <stop offset="100%" stop-color="#f97316"/>
        </linearGradient>
    </defs>
<filter id="pop_personas_business" x="-5%" y="-5%" width="110%" height="110%">
    <feMorphology in="SourceAlpha" operator="dilate" radius="1.5" result="expanded"/>
    <feFlood flood-color="#0a0e1a" result="dark"/>
    <feComposite in="dark" in2="expanded" operator="in" result="outline"/>
    <feMerge>
        <feMergeNode in="outline"/>
        <feMergeNode in="SourceGraphic"/>
    </feMerge>
</filter>
<g filter="url(#pop_personas_business)">


    <g transform="translate(64,64) rotate(30) translate(-64,-64)">
        <!-- Rocket body -->
        <path d="M64,14 C64,14 48,28 48,52 L48,80 L54,84 L54,76 L74,76 L74,84 L80,80 L80,52 C80,28 64,14 64,14 Z" 
              fill="url(#rocketBodypersonas_business)" />
        <!-- Left fin -->
        <polygon points="48,68 34,88 48,80" fill="url(#rocketBodypersonas_business)" />
        <!-- Right fin -->
        <polygon points="80,68 94,88 80,80" fill="url(#rocketBodypersonas_business)" />
        <!-- A cutout (negative space) -->
        <path d="M64,26 L55,62 L58,62 L61,52 L67,52 L70,62 L73,62 Z M62.5,47 L64,36 L65.5,47 Z" 
              fill="#ffffff" />
        <!-- Exhaust flame -->
        <polygon points="54,82 64,98 74,82" fill="url(#flameGradpersonas_business)" />
    </g>
<!-- Large briefcase bottom-right -->
    <g transform="translate(60, 46)">
        <rect x="0" y="10" width="46" height="34" rx="6" fill="#64748b" opacity="0.85"/>
        <path d="M14,10 L14,2 L32,2 L32,10" stroke="#64748b" stroke-width="3" fill="none"/>
        <rect x="17" y="22" width="12" height="6" rx="2" fill="#ffffff" opacity="0.35"/>
        <line x1="5" y1="30" x2="41" y2="30" stroke="#ffffff" stroke-width="1" opacity="0.2"/>
        <!-- Document peeking out -->
        <rect x="8" y="4" width="16" height="10" rx="1" fill="#ffffff" opacity="0.25"/>
        <line x1="10" y1="7" x2="20" y2="7" stroke="#64748b" stroke-width="0.8" opacity="0.15"/>
        <line x1="10" y1="10" x2="18" y2="10" stroke="#64748b" stroke-width="0.8" opacity="0.12"/>
    </g>
    <!-- Small chart top-left -->
    <g transform="translate(8, 18)">
        <rect x="0" y="0" width="28" height="22" rx="2" fill="#64748b" opacity="0.35" stroke="#64748b" stroke-width="1.5"/>
        <polyline points="4,18 10,10 16,13 24,4" fill="none" stroke="#64748b" stroke-width="2" opacity="0.6" stroke-linecap="round"/>
    </g>

</g>
</svg>