<svg xmlns="http://www.w3.org/2000/svg" viewBox="6 6 116 116" width="128" height="128">

    <defs>
        <linearGradient id="rocketBodypersonas_software" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#38bdf8"/>
            <stop offset="100%" stop-color="#0284c7"/>
        </linearGradient>
        <linearGradient id="flameGradpersonas_software" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#fdba74"/>
            <stop offset="100%" stop-color="#f97316"/>
        </linearGradient>
    </defs>
<filter id="pop_personas_software" x="-5%" y="-5%" width="110%" height="110%">
    <feMorphology in="SourceAlpha" operator="dilate" radius="1.5" result="expanded"/>
    <feFlood flood-color="#0a0e1a" result="dark"/>
    <feComposite in="dark" in2="expanded" operator="in" result="outline"/>
    <feMerge>
        <feMergeNode in="outline"/>
        <feMergeNode in="SourceGraphic"/>
    </feMerge>
</filter>
<g filter="url(#pop_personas_software)">


    <g transform="translate(64,64) rotate(30) translate(-64,-64)">
        <!-- Rocket body -->
        <path d="M64,14 C64,14 48,28 48,52 L48,80 L54,84 L54,76 L74,76 L74,84 L80,80 L80,52 C80,28 64,14 64,14 Z" 
              fill="url(#rocketBodypersonas_software)" />
        <!-- Left fin -->
        <polygon points="48,68 34,88 48,80" fill="url(#rocketBodypersonas_software)" />
        <!-- Right fin -->
        <polygon points="80,68 94,88 80,80" fill="url(#rocketBodypersonas_software)" />
        <!-- A cutout (negative space) -->
        <path d="M64,26 L55,62 L58,62 L61,52 L67,52 L70,62 L73,62 Z M62.5,47 L64,36 L65.5,47 Z" 
              fill="#ffffff" />
        <!-- Exhaust flame -->
        <polygon points="54,82 64,98 74,82" fill="url(#flameGradpersonas_software)" />
    </g>
<g transform="translate(72, 56)">
        <!-- Screen lid -->
        <rect x="0" y="0" width="40" height="28" rx="3" fill="#6366f1" opacity="0.85"/>
        <!-- Screen -->
        <rect x="3" y="3" width="34" height="21" rx="1.5" fill="#0f172a" opacity="0.9"/>
        <!-- Code lines — brighter -->
        <line x1="6" y1="7" x2="22" y2="7" stroke="#4ade80" stroke-width="1.5" opacity="0.8"/>
        <line x1="8" y1="11" x2="28" y2="11" stroke="#38bdf8" stroke-width="1.5" opacity="0.7"/>
        <line x1="8" y1="15" x2="20" y2="15" stroke="#a78bfa" stroke-width="1.5" opacity="0.6"/>
        <line x1="6" y1="19" x2="26" y2="19" stroke="#4ade80" stroke-width="1.5" opacity="0.5"/>
        <!-- Cursor blink -->
        <rect x="22" y="14" width="1.5" height="3" fill="#4ade80" opacity="0.9"/>
        <!-- Keyboard base -->
        <rect x="-3" y="28" width="46" height="5" rx="1.5" fill="#6366f1" opacity="0.55"/>
        <!-- Trackpad hint -->
        <rect x="13" y="29" width="14" height="3" rx="1" fill="#ffffff" opacity="0.12"/>
    </g>

</g>
</svg>