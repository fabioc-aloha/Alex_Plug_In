<svg xmlns="http://www.w3.org/2000/svg" viewBox="6 6 116 116" width="128" height="128">

    <defs>
        <linearGradient id="rocketBodypersonas_legal" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#38bdf8"/>
            <stop offset="100%" stop-color="#0284c7"/>
        </linearGradient>
        <linearGradient id="flameGradpersonas_legal" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#fdba74"/>
            <stop offset="100%" stop-color="#f97316"/>
        </linearGradient>
    </defs>
<filter id="pop_personas_legal" x="-5%" y="-5%" width="110%" height="110%">
    <feMorphology in="SourceAlpha" operator="dilate" radius="1.5" result="expanded"/>
    <feFlood flood-color="#0a0e1a" result="dark"/>
    <feComposite in="dark" in2="expanded" operator="in" result="outline"/>
    <feMerge>
        <feMergeNode in="outline"/>
        <feMergeNode in="SourceGraphic"/>
    </feMerge>
</filter>
<g filter="url(#pop_personas_legal)">
<g transform="rotate(-15, 64, 64)">

    <g transform="translate(64,64) rotate(30) translate(-64,-64)">
        <!-- Rocket body -->
        <path d="M64,14 C64,14 48,28 48,52 L48,80 L54,84 L54,76 L74,76 L74,84 L80,80 L80,52 C80,28 64,14 64,14 Z" 
              fill="url(#rocketBodypersonas_legal)" />
        <!-- Left fin -->
        <polygon points="48,68 34,88 48,80" fill="url(#rocketBodypersonas_legal)" />
        <!-- Right fin -->
        <polygon points="80,68 94,88 80,80" fill="url(#rocketBodypersonas_legal)" />
        <!-- A cutout (negative space) -->
        <path d="M64,26 L55,62 L58,62 L61,52 L67,52 L70,62 L73,62 Z M62.5,47 L64,36 L65.5,47 Z" 
              fill="#ffffff" />
        <!-- Exhaust flame -->
        <polygon points="54,82 64,98 74,82" fill="url(#flameGradpersonas_legal)" />
    </g>
<!-- Large balance scale — fills left side -->
    <g transform="translate(32, 32)">
        <line x1="0" y1="-16" x2="0" y2="14" stroke="#eab308" stroke-width="3" stroke-linecap="round"/>
        <rect x="-10" y="12" width="20" height="4" rx="2" fill="#eab308" opacity="0.8"/>
        <line x1="-20" y1="-14" x2="20" y2="-14" stroke="#eab308" stroke-width="2.5" stroke-linecap="round"/>
        <polygon points="-5,-16 5,-16 0,-22" fill="#eab308" opacity="0.9"/>
        <line x1="-20" y1="-14" x2="-20" y2="-4" stroke="#eab308" stroke-width="2"/>
        <path d="M-26,-4 Q-20,0 -14,-4" stroke="#eab308" stroke-width="2" fill="#eab308" opacity="0.3"/>
        <line x1="20" y1="-14" x2="20" y2="-4" stroke="#eab308" stroke-width="2"/>
        <path d="M14,-4 Q20,0 26,-4" stroke="#eab308" stroke-width="2" fill="#eab308" opacity="0.3"/>
    </g>
    <!-- Gavel bottom-right -->
    <g transform="translate(96, 78) rotate(-20)">
        <rect x="-2" y="0" width="4" height="18" rx="1.5" fill="#eab308" opacity="0.6"/>
        <rect x="-8" y="-4" width="16" height="6" rx="2" fill="#eab308" opacity="0.8"/>
    </g>
</g>
</g>
</svg>