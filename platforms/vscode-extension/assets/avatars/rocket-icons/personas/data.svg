<svg xmlns="http://www.w3.org/2000/svg" viewBox="6 6 116 116" width="128" height="128">

    <defs>
        <linearGradient id="rocketBodypersonas_data" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#38bdf8"/>
            <stop offset="100%" stop-color="#0284c7"/>
        </linearGradient>
        <linearGradient id="flameGradpersonas_data" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#fdba74"/>
            <stop offset="100%" stop-color="#f97316"/>
        </linearGradient>
    </defs>
<filter id="pop_personas_data" x="-5%" y="-5%" width="110%" height="110%">
    <feMorphology in="SourceAlpha" operator="dilate" radius="1.5" result="expanded"/>
    <feFlood flood-color="#0a0e1a" result="dark"/>
    <feComposite in="dark" in2="expanded" operator="in" result="outline"/>
    <feMerge>
        <feMergeNode in="outline"/>
        <feMergeNode in="SourceGraphic"/>
    </feMerge>
</filter>
<g filter="url(#pop_personas_data)">
<g transform="rotate(5, 64, 64)">

    <g transform="translate(64,64) rotate(30) translate(-64,-64)">
        <!-- Rocket body -->
        <path d="M64,14 C64,14 48,28 48,52 L48,80 L54,84 L54,76 L74,76 L74,84 L80,80 L80,52 C80,28 64,14 64,14 Z" 
              fill="url(#rocketBodypersonas_data)" />
        <!-- Left fin -->
        <polygon points="48,68 34,88 48,80" fill="url(#rocketBodypersonas_data)" />
        <!-- Right fin -->
        <polygon points="80,68 94,88 80,80" fill="url(#rocketBodypersonas_data)" />
        <!-- A cutout (negative space) -->
        <path d="M64,26 L55,62 L58,62 L61,52 L67,52 L70,62 L73,62 Z M62.5,47 L64,36 L65.5,47 Z" 
              fill="#ffffff" />
        <!-- Exhaust flame -->
        <polygon points="54,82 64,98 74,82" fill="url(#flameGradpersonas_data)" />
    </g>
<!-- Large chart panel bottom-right -->
    <g transform="translate(66, 38)">
        <rect x="0" y="0" width="44" height="40" rx="3" fill="#06b6d4" opacity="0.15" stroke="#06b6d4" stroke-width="1.5"/>
        <!-- Bar chart — taller -->
        <rect x="4" y="24" width="8" height="13" fill="#06b6d4" opacity="0.6"/>
        <rect x="14" y="16" width="8" height="21" fill="#06b6d4" opacity="0.7"/>
        <rect x="24" y="6" width="8" height="31" fill="#06b6d4" opacity="0.85"/>
        <rect x="34" y="18" width="7" height="19" fill="#06b6d4" opacity="0.7"/>
        <!-- Trend line -->
        <polyline points="8,21 18,12 28,4 37,15" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.5"/>
    </g>
    <!-- Data nodes — foreground overlap left -->
    <g transform="translate(22, 30)">
        <circle cx="0" cy="0" r="7" fill="#06b6d4" opacity="0.55"/>
        <circle cx="16" cy="18" r="6" fill="#06b6d4" opacity="0.45"/>
        <circle cx="-2" cy="36" r="5" fill="#06b6d4" opacity="0.5"/>
        <line x1="5" y1="5" x2="12" y2="14" stroke="#06b6d4" stroke-width="2" opacity="0.35"/>
        <line x1="13" y1="22" x2="1" y2="32" stroke="#06b6d4" stroke-width="2" opacity="0.3"/>
        <line x1="0" y1="7" x2="-1" y2="31" stroke="#06b6d4" stroke-width="1.5" opacity="0.2"/>
    </g>
</g>
</g>
</svg>