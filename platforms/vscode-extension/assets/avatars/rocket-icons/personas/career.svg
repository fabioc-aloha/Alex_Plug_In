<svg xmlns="http://www.w3.org/2000/svg" viewBox="6 6 116 116" width="128" height="128">

    <defs>
        <linearGradient id="rocketBodypersonas_career" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#38bdf8"/>
            <stop offset="100%" stop-color="#0284c7"/>
        </linearGradient>
        <linearGradient id="flameGradpersonas_career" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#fdba74"/>
            <stop offset="100%" stop-color="#f97316"/>
        </linearGradient>
    </defs>
<filter id="pop_personas_career" x="-5%" y="-5%" width="110%" height="110%">
    <feMorphology in="SourceAlpha" operator="dilate" radius="1.5" result="expanded"/>
    <feFlood flood-color="#0a0e1a" result="dark"/>
    <feComposite in="dark" in2="expanded" operator="in" result="outline"/>
    <feMerge>
        <feMergeNode in="outline"/>
        <feMergeNode in="SourceGraphic"/>
    </feMerge>
</filter>
<g filter="url(#pop_personas_career)">
<g transform="rotate(20, 64, 64)">

    <g transform="translate(64,64) rotate(30) translate(-64,-64)">
        <!-- Rocket body -->
        <path d="M64,14 C64,14 48,28 48,52 L48,80 L54,84 L54,76 L74,76 L74,84 L80,80 L80,52 C80,28 64,14 64,14 Z" 
              fill="url(#rocketBodypersonas_career)" />
        <!-- Left fin -->
        <polygon points="48,68 34,88 48,80" fill="url(#rocketBodypersonas_career)" />
        <!-- Right fin -->
        <polygon points="80,68 94,88 80,80" fill="url(#rocketBodypersonas_career)" />
        <!-- A cutout (negative space) -->
        <path d="M64,26 L55,62 L58,62 L61,52 L67,52 L70,62 L73,62 Z M62.5,47 L64,36 L65.5,47 Z" 
              fill="#ffffff" />
        <!-- Exhaust flame -->
        <polygon points="54,82 64,98 74,82" fill="url(#flameGradpersonas_career)" />
    </g>
<!-- Large org chart — fills left side -->
    <g transform="translate(30, 36)">
        <rect x="-8" y="-12" width="16" height="12" rx="3" fill="#0ea5e9" opacity="0.95"/>
        <circle cx="0" cy="-18" r="4" fill="#0ea5e9" opacity="0.8"/>
        <line x1="0" y1="0" x2="0" y2="8" stroke="#0ea5e9" stroke-width="2.5"/>
        <line x1="-18" y1="8" x2="18" y2="8" stroke="#0ea5e9" stroke-width="2.5"/>
        <line x1="-18" y1="8" x2="-18" y2="16" stroke="#0ea5e9" stroke-width="2.5"/>
        <line x1="0" y1="8" x2="0" y2="16" stroke="#0ea5e9" stroke-width="2.5"/>
        <line x1="18" y1="8" x2="18" y2="16" stroke="#0ea5e9" stroke-width="2.5"/>
        <rect x="-24" y="16" width="14" height="11" rx="3" fill="#0ea5e9" opacity="0.7"/>
        <rect x="-7" y="16" width="14" height="11" rx="3" fill="#0ea5e9" opacity="0.7"/>
        <rect x="11" y="16" width="14" height="11" rx="3" fill="#0ea5e9" opacity="0.7"/>
        <line x1="0" y1="-24" x2="0" y2="-30" stroke="#0ea5e9" stroke-width="2.5" stroke-linecap="round"/>
        <polyline points="-5,-26 0,-30 5,-26" stroke="#0ea5e9" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
</g>
</g>
</svg>