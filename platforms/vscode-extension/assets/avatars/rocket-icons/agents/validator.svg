<svg xmlns="http://www.w3.org/2000/svg" viewBox="6 6 116 116" width="128" height="128">

    <defs>
        <linearGradient id="rocketBodyagents_validator" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#38bdf8"/>
            <stop offset="100%" stop-color="#0284c7"/>
        </linearGradient>
        <linearGradient id="flameGradagents_validator" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#fdba74"/>
            <stop offset="100%" stop-color="#f97316"/>
        </linearGradient>
    </defs>
<filter id="pop_agents_validator" x="-5%" y="-5%" width="110%" height="110%">
    <feMorphology in="SourceAlpha" operator="dilate" radius="1.5" result="expanded"/>
    <feFlood flood-color="#0a0e1a" result="dark"/>
    <feComposite in="dark" in2="expanded" operator="in" result="outline"/>
    <feMerge>
        <feMergeNode in="outline"/>
        <feMergeNode in="SourceGraphic"/>
    </feMerge>
</filter>
<g filter="url(#pop_agents_validator)">
<g transform="rotate(-15, 64, 64)">

    <g transform="translate(64,64) rotate(30) translate(-64,-64)">
        <!-- Rocket body -->
        <path d="M64,14 C64,14 48,28 48,52 L48,80 L54,84 L54,76 L74,76 L74,84 L80,80 L80,52 C80,28 64,14 64,14 Z" 
              fill="url(#rocketBodyagents_validator)" />
        <!-- Left fin -->
        <polygon points="48,68 34,88 48,80" fill="url(#rocketBodyagents_validator)" />
        <!-- Right fin -->
        <polygon points="80,68 94,88 80,80" fill="url(#rocketBodyagents_validator)" />
        <!-- A cutout (negative space) -->
        <path d="M64,26 L55,62 L58,62 L61,52 L67,52 L70,62 L73,62 Z M62.5,47 L64,36 L65.5,47 Z" 
              fill="#ffffff" />
        <!-- Exhaust flame -->
        <polygon points="54,82 64,98 74,82" fill="url(#flameGradagents_validator)" />
    </g>

    <!-- Large shield — fills left side -->
    <g transform="translate(8, 44)">
        <path d="M0,-22 L28,-22 L28,4 Q28,22 14,30 Q0,22 0,4 Z" fill="#f43f5e" opacity="0.85"/>
        <!-- Checkmark -->
        <polyline points="6,0 12,7 22,-7" stroke="#ffffff" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
        <!-- Shield border highlight -->
        <path d="M2,-20 L26,-20 L26,3 Q26,19 14,26 Q2,19 2,3 Z" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.15"/>
    </g>
    <!-- Rejected X marks right side -->
    <g transform="translate(94, 72)">
        <g opacity="0.6">
            <line x1="-5" y1="-5" x2="5" y2="5" stroke="#f43f5e" stroke-width="2.5" stroke-linecap="round"/>
            <line x1="5" y1="-5" x2="-5" y2="5" stroke="#f43f5e" stroke-width="2.5" stroke-linecap="round"/>
        </g>
        <g transform="translate(0, 16)" opacity="0.4">
            <line x1="-4" y1="-4" x2="4" y2="4" stroke="#f43f5e" stroke-width="2" stroke-linecap="round"/>
            <line x1="4" y1="-4" x2="-4" y2="4" stroke="#f43f5e" stroke-width="2" stroke-linecap="round"/>
        </g>
    </g>
</g>
</g>
</svg>