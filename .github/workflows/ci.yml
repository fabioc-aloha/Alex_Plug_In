name: CI

on:
    push:
        branches: [main, master]
    pull_request:
        branches: [main, master]

jobs:
    build-test:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "20"
                  cache: "npm"
                  cache-dependency-path: platforms/vscode-extension/package-lock.json

            - name: Install dependencies (vscode extension)
              working-directory: platforms/vscode-extension
              run: npm ci

            - name: TypeScript check (no emit)
              working-directory: platforms/vscode-extension
              run: npm run check-types

            - name: Strict unused check
              working-directory: platforms/vscode-extension
              run: npx tsc --noEmit --noUnusedLocals --noUnusedParameters

            - name: Lint
              working-directory: platforms/vscode-extension
              run: npm run lint

            - name: Unused exports audit (enforced)
              working-directory: platforms/vscode-extension
              run: npm run lint:unused

            - name: Audit synapses
              run: node scripts/audit-synapses.cjs

            - name: Audit architecture
              run: node scripts/audit-architecture.cjs

            - name: Audit skill activation index
              run: node scripts/audit-skill-activation-index.cjs

            - name: Audit heir sync drift
              run: node scripts/audit-heir-sync-drift.cjs

            - name: Docs lint
              run: node scripts/lint-docs.cjs

            - name: Quality gate
              working-directory: platforms/vscode-extension
              run: npm run quality-gate

            - name: Tests
              working-directory: platforms/vscode-extension
              run: npm test
