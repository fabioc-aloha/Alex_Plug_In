<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" width="1200" height="300">
  <defs>
    <!-- Microsoft Blue Gradient -->
    <linearGradient id="msGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0078D4;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#005a9e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#004578;stop-opacity:1" />
    </linearGradient>
    
    <!-- Subtle pattern overlay -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
    </pattern>
    
    <!-- Glow filter -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Text shadow -->
    <filter id="textShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="300" fill="url(#msGradient)"/>
  <rect width="1200" height="300" fill="url(#grid)"/>
  
  <!-- Decorative circles -->
  <circle cx="100" cy="150" r="200" fill="rgba(255,255,255,0.03)"/>
  <circle cx="1100" cy="150" r="180" fill="rgba(255,255,255,0.02)"/>
  <circle cx="600" cy="300" r="150" fill="rgba(0,0,0,0.1)"/>
  
  <!-- Abstract geometric logo -->
  <g transform="translate(100, 100)">
    <!-- Hexagonal shape representing "Agent" -->
    <polygon points="50,0 100,25 100,75 50,100 0,75 0,25" 
             fill="none" stroke="rgba(255,255,255,0.8)" stroke-width="2" filter="url(#glow)"/>
    <polygon points="50,15 85,32.5 85,67.5 50,85 15,67.5 15,32.5" 
             fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.4)" stroke-width="1"/>
    <!-- Center dot -->
    <circle cx="50" cy="50" r="8" fill="white" opacity="0.9"/>
    <!-- Neural connection lines -->
    <line x1="50" y1="50" x2="50" y2="15" stroke="rgba(255,255,255,0.5)" stroke-width="1"/>
    <line x1="50" y1="50" x2="85" y2="67.5" stroke="rgba(255,255,255,0.5)" stroke-width="1"/>
    <line x1="50" y1="50" x2="15" y2="67.5" stroke="rgba(255,255,255,0.5)" stroke-width="1"/>
  </g>
  
  <!-- Main title -->
  <text x="250" y="140" font-family="Segoe UI, system-ui, sans-serif" font-size="80" font-weight="700" fill="white" filter="url(#textShadow)">
    GCX Copilot
  </text>
  
  <!-- Subtitle -->
  <text x="250" y="195" font-family="Segoe UI, system-ui, sans-serif" font-size="28" fill="rgba(255,255,255,0.9)">
    Your AI Partner for Code, Docs &amp; Integrations
  </text>
  
  <!-- Tagline -->
  <text x="250" y="240" font-family="Segoe UI, system-ui, sans-serif" font-size="18" fill="rgba(255,255,255,0.7)" font-style="italic">
    Skills • Instructions • Prompts • Agents
  </text>
  
  <!-- Version badge -->
  <g transform="translate(1050, 30)">
    <rect x="0" y="0" width="80" height="28" rx="14" fill="rgba(255,255,255,0.15)"/>
    <text x="40" y="19" font-family="Segoe UI, system-ui, sans-serif" font-size="12" fill="white" text-anchor="middle">
      v1.0
    </text>
  </g>
  
  <!-- GCX Logo - Bottom Right -->
  <g transform="translate(1080, 200)">
    <!-- GCX text logo -->
    <text x="0" y="50" font-family="Segoe UI, system-ui, sans-serif" font-size="48" font-weight="800" fill="rgba(255,255,255,0.25)" letter-spacing="4">
      GCX
    </text>
    <!-- Accent underline -->
    <rect x="0" y="58" width="100" height="3" rx="1.5" fill="rgba(255,255,255,0.15)"/>
  </g>
  
  <!-- Bottom accent line -->
  <rect x="0" y="290" width="1200" height="10" fill="rgba(0,0,0,0.2)"/>
  <rect x="0" y="292" width="400" height="8" fill="rgba(255,255,255,0.1)"/>
</svg>
