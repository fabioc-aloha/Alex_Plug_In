<svg xmlns="http://www.w3.org/2000/svg" viewBox="6 6 116 116" width="128" height="128">

    <defs>
        <linearGradient id="rocketBodypersonas_finance" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#38bdf8"/>
            <stop offset="100%" stop-color="#0284c7"/>
        </linearGradient>
        <linearGradient id="flameGradpersonas_finance" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#fdba74"/>
            <stop offset="100%" stop-color="#f97316"/>
        </linearGradient>
    </defs>
<filter id="pop_personas_finance" x="-5%" y="-5%" width="110%" height="110%">
    <feMorphology in="SourceAlpha" operator="dilate" radius="1.5" result="expanded"/>
    <feFlood flood-color="#0a0e1a" result="dark"/>
    <feComposite in="dark" in2="expanded" operator="in" result="outline"/>
    <feMerge>
        <feMergeNode in="outline"/>
        <feMergeNode in="SourceGraphic"/>
    </feMerge>
</filter>
<g filter="url(#pop_personas_finance)">
<g transform="rotate(-10, 64, 64)">

    <g transform="translate(64,64) rotate(30) translate(-64,-64)">
        <!-- Rocket body -->
        <path d="M64,14 C64,14 48,28 48,52 L48,80 L54,84 L54,76 L74,76 L74,84 L80,80 L80,52 C80,28 64,14 64,14 Z" 
              fill="url(#rocketBodypersonas_finance)" />
        <!-- Left fin -->
        <polygon points="48,68 34,88 48,80" fill="url(#rocketBodypersonas_finance)" />
        <!-- Right fin -->
        <polygon points="80,68 94,88 80,80" fill="url(#rocketBodypersonas_finance)" />
        <!-- A cutout (negative space) -->
        <path d="M64,26 L55,62 L58,62 L61,52 L67,52 L70,62 L73,62 Z M62.5,47 L64,36 L65.5,47 Z" 
              fill="#ffffff" />
        <!-- Exhaust flame -->
        <polygon points="54,82 64,98 74,82" fill="url(#flameGradpersonas_finance)" />
    </g>
<!-- Large calculator bottom-right -->
    <g transform="translate(70, 42)">
        <rect x="0" y="0" width="34" height="46" rx="4" fill="#22c55e" opacity="0.8"/>
        <rect x="3" y="3" width="28" height="12" rx="2" fill="#0a2e0a" opacity="0.6"/>
        <text x="28" y="12" font-size="8" fill="#4ade80" font-family="monospace" text-anchor="end" opacity="0.8">$1,024</text>
        <rect x="3" y="18" width="8" height="5.5" rx="1" fill="#ffffff" opacity="0.25"/><rect x="13" y="18" width="8" height="5.5" rx="1" fill="#ffffff" opacity="0.25"/><rect x="23" y="18" width="8" height="5.5" rx="1" fill="#ffffff" opacity="0.25"/><rect x="3" y="25" width="8" height="5.5" rx="1" fill="#ffffff" opacity="0.25"/><rect x="13" y="25" width="8" height="5.5" rx="1" fill="#ffffff" opacity="0.25"/><rect x="23" y="25" width="8" height="5.5" rx="1" fill="#ffffff" opacity="0.25"/><rect x="3" y="32" width="8" height="5.5" rx="1" fill="#ffffff" opacity="0.25"/><rect x="13" y="32" width="8" height="5.5" rx="1" fill="#ffffff" opacity="0.25"/><rect x="23" y="32" width="8" height="5.5" rx="1" fill="#ffffff" opacity="0.25"/><rect x="3" y="39" width="8" height="5.5" rx="1" fill="#ffffff" opacity="0.25"/><rect x="13" y="39" width="8" height="5.5" rx="1" fill="#ffffff" opacity="0.25"/><rect x="23" y="39" width="8" height="5.5" rx="1" fill="#ffffff" opacity="0.25"/>
    </g>
    <!-- Coins stack top-left -->
    <g transform="translate(12, 20)">
        <ellipse cx="10" cy="18" rx="11" ry="3.5" fill="#22c55e" opacity="0.45"/>
        <ellipse cx="10" cy="14" rx="11" ry="3.5" fill="#22c55e" opacity="0.55"/>
        <ellipse cx="10" cy="10" rx="11" ry="3.5" fill="#22c55e" opacity="0.65"/>
        <ellipse cx="10" cy="6" rx="11" ry="3.5" fill="#22c55e" opacity="0.75"/>
        <text x="10" y="9" font-size="7" fill="#ffffff" font-family="sans-serif" text-anchor="middle" opacity="0.5">$</text>
    </g>
</g>
</g>
</svg>