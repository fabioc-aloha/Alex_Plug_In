<svg xmlns="http://www.w3.org/2000/svg" viewBox="6 6 116 116" width="128" height="128">

    <defs>
        <linearGradient id="rocketBodypersonas_product" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#38bdf8"/>
            <stop offset="100%" stop-color="#0284c7"/>
        </linearGradient>
        <linearGradient id="flameGradpersonas_product" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#fdba74"/>
            <stop offset="100%" stop-color="#f97316"/>
        </linearGradient>
    </defs>
<filter id="pop_personas_product" x="-5%" y="-5%" width="110%" height="110%">
    <feMorphology in="SourceAlpha" operator="dilate" radius="1.5" result="expanded"/>
    <feFlood flood-color="#0a0e1a" result="dark"/>
    <feComposite in="dark" in2="expanded" operator="in" result="outline"/>
    <feMerge>
        <feMergeNode in="outline"/>
        <feMergeNode in="SourceGraphic"/>
    </feMerge>
</filter>
<g filter="url(#pop_personas_product)">
<g transform="rotate(10, 64, 64)">

    <g transform="translate(64,64) rotate(30) translate(-64,-64)">
        <!-- Rocket body -->
        <path d="M64,14 C64,14 48,28 48,52 L48,80 L54,84 L54,76 L74,76 L74,84 L80,80 L80,52 C80,28 64,14 64,14 Z" 
              fill="url(#rocketBodypersonas_product)" />
        <!-- Left fin -->
        <polygon points="48,68 34,88 48,80" fill="url(#rocketBodypersonas_product)" />
        <!-- Right fin -->
        <polygon points="80,68 94,88 80,80" fill="url(#rocketBodypersonas_product)" />
        <!-- A cutout (negative space) -->
        <path d="M64,26 L55,62 L58,62 L61,52 L67,52 L70,62 L73,62 Z M62.5,47 L64,36 L65.5,47 Z" 
              fill="#ffffff" />
        <!-- Exhaust flame -->
        <polygon points="54,82 64,98 74,82" fill="url(#flameGradpersonas_product)" />
    </g>

    <!-- Roadmap clipboard — foreground overlap -->
    <g transform="translate(58, 36)">
        <rect x="0" y="0" width="38" height="46" rx="3" fill="#f97316" opacity="0.7" stroke="#f97316" stroke-width="2"/>
        <!-- Clip at top -->
        <rect x="9" y="-4" width="20" height="7" rx="3" fill="#f97316" opacity="0.95"/>
        <!-- Milestone dots with connecting line (roadmap timeline) -->
        <line x1="10" y1="8" x2="10" y2="40" stroke="#ffffff" stroke-width="2" opacity="0.3"/>
        <!-- Done (green check) -->
        <circle cx="10" cy="13" r="4" fill="#22c55e" opacity="0.95"/>
        <line x1="16" y1="13" x2="32" y2="13" stroke="#ffffff" stroke-width="2" opacity="0.5"/>
        <!-- In progress (amber) -->
        <circle cx="10" cy="24" r="4" fill="#fbbf24" opacity="0.9"/>
        <line x1="16" y1="24" x2="29" y2="24" stroke="#ffffff" stroke-width="2" opacity="0.4"/>
        <!-- Upcoming (outline) -->
        <circle cx="10" cy="35" r="4" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.4"/>
        <line x1="16" y1="35" x2="26" y2="35" stroke="#ffffff" stroke-width="2" opacity="0.3"/>
    </g>
</g>
</g>
</svg>