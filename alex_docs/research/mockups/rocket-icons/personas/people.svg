<svg xmlns="http://www.w3.org/2000/svg" viewBox="6 6 116 116" width="128" height="128">

    <defs>
        <linearGradient id="rocketBodypersonas_people" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#38bdf8"/>
            <stop offset="100%" stop-color="#0284c7"/>
        </linearGradient>
        <linearGradient id="flameGradpersonas_people" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#fdba74"/>
            <stop offset="100%" stop-color="#f97316"/>
        </linearGradient>
    </defs>
<filter id="pop_personas_people" x="-5%" y="-5%" width="110%" height="110%">
    <feMorphology in="SourceAlpha" operator="dilate" radius="1.5" result="expanded"/>
    <feFlood flood-color="#0a0e1a" result="dark"/>
    <feComposite in="dark" in2="expanded" operator="in" result="outline"/>
    <feMerge>
        <feMergeNode in="outline"/>
        <feMergeNode in="SourceGraphic"/>
    </feMerge>
</filter>
<g filter="url(#pop_personas_people)">


    <g transform="translate(64,64) rotate(30) translate(-64,-64)">
        <!-- Rocket body -->
        <path d="M64,14 C64,14 48,28 48,52 L48,80 L54,84 L54,76 L74,76 L74,84 L80,80 L80,52 C80,28 64,14 64,14 Z" 
              fill="url(#rocketBodypersonas_people)" />
        <!-- Left fin -->
        <polygon points="48,68 34,88 48,80" fill="url(#rocketBodypersonas_people)" />
        <!-- Right fin -->
        <polygon points="80,68 94,88 80,80" fill="url(#rocketBodypersonas_people)" />
        <!-- A cutout (negative space) -->
        <path d="M64,26 L55,62 L58,62 L61,52 L67,52 L70,62 L73,62 Z M62.5,47 L64,36 L65.5,47 Z" 
              fill="#ffffff" />
        <!-- Exhaust flame -->
        <polygon points="54,82 64,98 74,82" fill="url(#flameGradpersonas_people)" />
    </g>

    <!-- Large heart — foreground overlap -->
    <g transform="translate(70, 30)">
        <path d="M0,-12 Q-16,-28 -24,-12 Q-24,4 0,22 Q24,4 24,-12 Q16,-28 0,-12" fill="#ec4899" opacity="0.9"/>
        <!-- Heart highlight -->
        <path d="M-10,-10 Q-14,-18 -18,-10" stroke="#ffffff" stroke-width="2" fill="none" opacity="0.25"/>
    </g>
    <!-- Community people silhouettes -->
    <g transform="translate(56, 64)" opacity="0.85">
        <!-- Person left -->
        <circle cx="0" cy="0" r="6" fill="#ec4899"/>
        <path d="M-8,7 Q0,12 8,7 L8,14 L-8,14 Z" fill="#ec4899" opacity="0.8"/>
        <!-- Person center -->
        <circle cx="20" cy="-3" r="6" fill="#ec4899"/>
        <path d="M12,4 Q20,9 28,4 L28,11 L12,11 Z" fill="#ec4899" opacity="0.8"/>
        <!-- Person right -->
        <circle cx="40" cy="0" r="6" fill="#ec4899"/>
        <path d="M32,7 Q40,12 48,7 L48,14 L32,14 Z" fill="#ec4899" opacity="0.8"/>
    </g>

</g>
</svg>