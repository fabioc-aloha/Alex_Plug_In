<svg xmlns="http://www.w3.org/2000/svg" viewBox="6 6 116 116" width="128" height="128">

    <defs>
        <linearGradient id="rocketBodypersonas_marketing" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#38bdf8"/>
            <stop offset="100%" stop-color="#0284c7"/>
        </linearGradient>
        <linearGradient id="flameGradpersonas_marketing" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#fdba74"/>
            <stop offset="100%" stop-color="#f97316"/>
        </linearGradient>
    </defs>
<filter id="pop_personas_marketing" x="-5%" y="-5%" width="110%" height="110%">
    <feMorphology in="SourceAlpha" operator="dilate" radius="1.5" result="expanded"/>
    <feFlood flood-color="#0a0e1a" result="dark"/>
    <feComposite in="dark" in2="expanded" operator="in" result="outline"/>
    <feMerge>
        <feMergeNode in="outline"/>
        <feMergeNode in="SourceGraphic"/>
    </feMerge>
</filter>
<g filter="url(#pop_personas_marketing)">
<g transform="rotate(15, 64, 64)">

    <g transform="translate(64,64) rotate(30) translate(-64,-64)">
        <!-- Rocket body -->
        <path d="M64,14 C64,14 48,28 48,52 L48,80 L54,84 L54,76 L74,76 L74,84 L80,80 L80,52 C80,28 64,14 64,14 Z" 
              fill="url(#rocketBodypersonas_marketing)" />
        <!-- Left fin -->
        <polygon points="48,68 34,88 48,80" fill="url(#rocketBodypersonas_marketing)" />
        <!-- Right fin -->
        <polygon points="80,68 94,88 80,80" fill="url(#rocketBodypersonas_marketing)" />
        <!-- A cutout (negative space) -->
        <path d="M64,26 L55,62 L58,62 L61,52 L67,52 L70,62 L73,62 Z M62.5,47 L64,36 L65.5,47 Z" 
              fill="#ffffff" />
        <!-- Exhaust flame -->
        <polygon points="54,82 64,98 74,82" fill="url(#flameGradpersonas_marketing)" />
    </g>

    <!-- Megaphone — foreground overlap -->
    <g transform="translate(56, 48) rotate(-15)">
        <!-- Bell / cone -->
        <path d="M14,0 L46,-18 L46,18 Z" fill="#f97316" opacity="0.9"/>
        <!-- Bell rim -->
        <ellipse cx="46" cy="0" rx="4" ry="18" fill="#f97316" opacity="0.75"/>
        <!-- Handle grip -->
        <rect x="0" y="-6" width="16" height="12" rx="3" fill="#f97316" opacity="0.95"/>
        <!-- Sound waves -->
        <path d="M51,-14 Q62,0 51,14" stroke="#f97316" stroke-width="3" fill="none" opacity="0.7"/>
        <path d="M58,-20 Q70,0 58,20" stroke="#f97316" stroke-width="2.5" fill="none" opacity="0.5"/>
    </g>
</g>
</g>
</svg>