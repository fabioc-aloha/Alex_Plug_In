<svg xmlns="http://www.w3.org/2000/svg" viewBox="6 6 116 116" width="128" height="128">

    <defs>
        <linearGradient id="rocketBodystates_dream" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#38bdf8"/>
            <stop offset="100%" stop-color="#0284c7"/>
        </linearGradient>
        <linearGradient id="flameGradstates_dream" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#fdba74"/>
            <stop offset="100%" stop-color="#f97316"/>
        </linearGradient>
    </defs>
<filter id="pop_states_dream" x="-5%" y="-5%" width="110%" height="110%">
    <feMorphology in="SourceAlpha" operator="dilate" radius="1.5" result="expanded"/>
    <feFlood flood-color="#0a0e1a" result="dark"/>
    <feComposite in="dark" in2="expanded" operator="in" result="outline"/>
    <feMerge>
        <feMergeNode in="outline"/>
        <feMergeNode in="SourceGraphic"/>
    </feMerge>
</filter>
<g filter="url(#pop_states_dream)">
<g transform="rotate(-25, 64, 64)">

    <g transform="translate(64,64) rotate(30) translate(-64,-64)">
        <!-- Rocket body -->
        <path d="M64,14 C64,14 48,28 48,52 L48,80 L54,84 L54,76 L74,76 L74,84 L80,80 L80,52 C80,28 64,14 64,14 Z" 
              fill="url(#rocketBodystates_dream)" />
        <!-- Left fin -->
        <polygon points="48,68 34,88 48,80" fill="url(#rocketBodystates_dream)" />
        <!-- Right fin -->
        <polygon points="80,68 94,88 80,80" fill="url(#rocketBodystates_dream)" />
        <!-- A cutout (negative space) -->
        <path d="M64,26 L55,62 L58,62 L61,52 L67,52 L70,62 L73,62 Z M62.5,47 L64,36 L65.5,47 Z" 
              fill="#ffffff" />
        <!-- Exhaust flame -->
        <polygon points="54,82 64,98 74,82" fill="url(#flameGradstates_dream)" />
    </g>

    <g transform="translate(64,64) rotate(30) translate(-64,-64)">
        <!-- Elastic strap wrapping around head -->
        <path d="M42,36 Q38,34 38,30 Q38,26 42,24" stroke="#8b5cf6" stroke-width="1.8" fill="none" stroke-linecap="round" opacity="0.5"/>
        <path d="M86,36 Q90,34 90,30 Q90,26 86,24" stroke="#8b5cf6" stroke-width="1.8" fill="none" stroke-linecap="round" opacity="0.5"/>
        <!-- Main mask band — smooth contoured sleep mask -->
        <path d="M44,30 Q44,26 50,26 L54,25 Q58,24 64,25 Q70,24 74,25 L78,26 Q84,26 84,30 Q84,34 80,38 Q76,42 72,42 Q68,42 64,40 Q60,42 56,42 Q52,42 48,38 Q44,34 44,30 Z" fill="#8b5cf6" opacity="0.9"/>
        <!-- Left eye contour — padded oval indent -->
        <ellipse cx="54" cy="34" rx="7" ry="5.5" fill="#0f172a" opacity="0.35"/>
        <!-- Right eye contour — padded oval indent -->
        <ellipse cx="74" cy="34" rx="7" ry="5.5" fill="#0f172a" opacity="0.35"/>
        <!-- Nose bridge cutout -->
        <path d="M61,38 Q64,42 67,38" fill="#0f172a" opacity="0.2"/>
    </g>
    <!-- Zzzz... floating in screen space -->
    <text x="88" y="30" font-family="Segoe UI, sans-serif" font-size="16" font-weight="800" fill="#8b5cf6" opacity="0.9">Z</text>
    <text x="98" y="20" font-family="Segoe UI, sans-serif" font-size="13" font-weight="700" fill="#8b5cf6" opacity="0.7">z</text>
    <text x="106" y="12" font-family="Segoe UI, sans-serif" font-size="10" font-weight="700" fill="#8b5cf6" opacity="0.5">z</text>
    <text x="112" y="7" font-family="Segoe UI, sans-serif" font-size="7" font-weight="600" fill="#8b5cf6" opacity="0.45">z</text>
</g>
</g>
</svg>