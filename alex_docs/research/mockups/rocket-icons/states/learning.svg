<svg xmlns="http://www.w3.org/2000/svg" viewBox="6 6 116 116" width="128" height="128">

    <defs>
        <linearGradient id="rocketBodystates_learning" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#38bdf8"/>
            <stop offset="100%" stop-color="#0284c7"/>
        </linearGradient>
        <linearGradient id="flameGradstates_learning" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#fdba74"/>
            <stop offset="100%" stop-color="#f97316"/>
        </linearGradient>
    </defs>
<filter id="pop_states_learning" x="-5%" y="-5%" width="110%" height="110%">
    <feMorphology in="SourceAlpha" operator="dilate" radius="1.5" result="expanded"/>
    <feFlood flood-color="#0a0e1a" result="dark"/>
    <feComposite in="dark" in2="expanded" operator="in" result="outline"/>
    <feMerge>
        <feMergeNode in="outline"/>
        <feMergeNode in="SourceGraphic"/>
    </feMerge>
</filter>
<g filter="url(#pop_states_learning)">


    <g transform="translate(64,64) rotate(30) translate(-64,-64)">
        <!-- Rocket body -->
        <path d="M64,14 C64,14 48,28 48,52 L48,80 L54,84 L54,76 L74,76 L74,84 L80,80 L80,52 C80,28 64,14 64,14 Z" 
              fill="url(#rocketBodystates_learning)" />
        <!-- Left fin -->
        <polygon points="48,68 34,88 48,80" fill="url(#rocketBodystates_learning)" />
        <!-- Right fin -->
        <polygon points="80,68 94,88 80,80" fill="url(#rocketBodystates_learning)" />
        <!-- A cutout (negative space) -->
        <path d="M64,26 L55,62 L58,62 L61,52 L67,52 L70,62 L73,62 Z M62.5,47 L64,36 L65.5,47 Z" 
              fill="#ffffff" />
        <!-- Exhaust flame -->
        <polygon points="54,82 64,98 74,82" fill="url(#flameGradstates_learning)" />
    </g>

    <!-- Open book — large, colored, unmistakable -->
    <g transform="translate(8, 62)">
        <!-- Book cover/back -->
        <path d="M22,-4 L0,2 L0,32 L22,26 Z" fill="#22c55e" opacity="0.3"/>
        <path d="M22,-4 L44,2 L44,32 L22,26 Z" fill="#22c55e" opacity="0.2"/>
        <!-- Left page -->
        <path d="M22,-2 L2,3 L2,30 L22,24 Z" fill="#ffffff" opacity="0.9"/>
        <!-- Right page -->
        <path d="M22,-2 L42,3 L42,30 L22,24 Z" fill="#ffffff" opacity="0.75"/>
        <!-- Spine -->
        <line x1="22" y1="-2" x2="22" y2="24" stroke="#22c55e" stroke-width="2" opacity="0.7"/>
        <!-- Text lines left -->
        <line x1="6" y1="10" x2="18" y2="7" stroke="#22c55e" stroke-width="1.5" opacity="0.4" stroke-linecap="round"/>
        <line x1="6" y1="16" x2="17" y2="13" stroke="#22c55e" stroke-width="1.5" opacity="0.35" stroke-linecap="round"/>
        <line x1="6" y1="22" x2="15" y2="19" stroke="#22c55e" stroke-width="1.5" opacity="0.3" stroke-linecap="round"/>
        <!-- Text lines right -->
        <line x1="26" y1="7" x2="38" y2="10" stroke="#22c55e" stroke-width="1.5" opacity="0.4" stroke-linecap="round"/>
        <line x1="26" y1="13" x2="37" y2="16" stroke="#22c55e" stroke-width="1.5" opacity="0.35" stroke-linecap="round"/>
    </g>
    <!-- Lightbulb "aha!" top-right — bold -->
    <g transform="translate(100, 16)">
        <circle cx="0" cy="0" r="14" fill="#22c55e" opacity="0.12"/>
        <circle cx="0" cy="0" r="9" fill="#22c55e" opacity="0.18"/>
        <path d="M0,-9 Q-7,-9 -7,-1 Q-7,4 -4,8 L4,8 Q7,4 7,-1 Q7,-9 0,-9 Z" fill="#22c55e" opacity="0.85"/>
        <path d="M-1.5,0 L0,-3 L1.5,0" stroke="#ffffff" stroke-width="1.2" fill="none" opacity="0.6"/>
        <rect x="-3" y="8" width="6" height="2.5" rx="1" fill="#22c55e" opacity="0.6"/>
        <line x1="0" y1="-14" x2="0" y2="-18" stroke="#22c55e" stroke-width="2" opacity="0.5" stroke-linecap="round"/>
        <line x1="10" y1="-6" x2="14" y2="-9" stroke="#22c55e" stroke-width="2" opacity="0.45" stroke-linecap="round"/>
        <line x1="-10" y1="-6" x2="-14" y2="-9" stroke="#22c55e" stroke-width="2" opacity="0.45" stroke-linecap="round"/>
    </g>

</g>
</svg>