<svg xmlns="http://www.w3.org/2000/svg" viewBox="6 6 116 116" width="128" height="128">

    <defs>
        <linearGradient id="rocketBodystates_debugging" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#38bdf8"/>
            <stop offset="100%" stop-color="#0284c7"/>
        </linearGradient>
        <linearGradient id="flameGradstates_debugging" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#fdba74"/>
            <stop offset="100%" stop-color="#f97316"/>
        </linearGradient>
    </defs>
<filter id="pop_states_debugging" x="-5%" y="-5%" width="110%" height="110%">
    <feMorphology in="SourceAlpha" operator="dilate" radius="1.5" result="expanded"/>
    <feFlood flood-color="#0a0e1a" result="dark"/>
    <feComposite in="dark" in2="expanded" operator="in" result="outline"/>
    <feMerge>
        <feMergeNode in="outline"/>
        <feMergeNode in="SourceGraphic"/>
    </feMerge>
</filter>
<g filter="url(#pop_states_debugging)">
<g transform="rotate(-15, 64, 64)">

    <g transform="translate(64,64) rotate(30) translate(-64,-64)">
        <!-- Rocket body -->
        <path d="M64,14 C64,14 48,28 48,52 L48,80 L54,84 L54,76 L74,76 L74,84 L80,80 L80,52 C80,28 64,14 64,14 Z" 
              fill="url(#rocketBodystates_debugging)" />
        <!-- Left fin -->
        <polygon points="48,68 34,88 48,80" fill="url(#rocketBodystates_debugging)" />
        <!-- Right fin -->
        <polygon points="80,68 94,88 80,80" fill="url(#rocketBodystates_debugging)" />
        <!-- A cutout (negative space) -->
        <path d="M64,26 L55,62 L58,62 L61,52 L67,52 L70,62 L73,62 Z M62.5,47 L64,36 L65.5,47 Z" 
              fill="#ffffff" />
        <!-- Exhaust flame -->
        <polygon points="54,82 64,98 74,82" fill="url(#flameGradstates_debugging)" />
    </g>

    <g transform="translate(64,64) rotate(30) translate(-64,-64)">
        <!-- Deerstalker / detective hat -->
        <ellipse cx="64" cy="22" rx="18" ry="5" fill="#f43f5e" opacity="0.9"/>
        <path d="M50,22 Q50,8 64,6 Q78,8 78,22 Z" fill="#f43f5e"/>
        <!-- Front bill -->
        <path d="M52,22 L46,28 L58,24 Z" fill="#f43f5e" opacity="0.8"/>
        <!-- Back bill -->
        <path d="M76,22 L82,28 L70,24 Z" fill="#f43f5e" opacity="0.8"/>
    </g>
    <g transform="translate(64,64) rotate(30) translate(-64,-64)">
        <!-- Magnifying glass, held to the right -->
        <circle cx="90" cy="40" r="10" fill="none" stroke="#f43f5e" stroke-width="3"/>
        <line x1="83" y1="47" x2="76" y2="54" stroke="#f43f5e" stroke-width="3" stroke-linecap="round"/>
        <!-- Glass shine -->
        <path d="M86,34 Q88,33 90,34" stroke="#ffffff" stroke-width="1.5" fill="none" opacity="0.5"/>
    </g>
</g>
</g>
</svg>