<svg xmlns="http://www.w3.org/2000/svg" viewBox="6 6 116 116" width="128" height="128">

    <defs>
        <linearGradient id="rocketBodyagents_documentarian" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#38bdf8"/>
            <stop offset="100%" stop-color="#0284c7"/>
        </linearGradient>
        <linearGradient id="flameGradagents_documentarian" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#fdba74"/>
            <stop offset="100%" stop-color="#f97316"/>
        </linearGradient>
    </defs>
<filter id="pop_agents_documentarian" x="-5%" y="-5%" width="110%" height="110%">
    <feMorphology in="SourceAlpha" operator="dilate" radius="1.5" result="expanded"/>
    <feFlood flood-color="#0a0e1a" result="dark"/>
    <feComposite in="dark" in2="expanded" operator="in" result="outline"/>
    <feMerge>
        <feMergeNode in="outline"/>
        <feMergeNode in="SourceGraphic"/>
    </feMerge>
</filter>
<g filter="url(#pop_agents_documentarian)">
<g transform="rotate(5, 64, 64)">

    <g transform="translate(64,64) rotate(30) translate(-64,-64)">
        <!-- Rocket body -->
        <path d="M64,14 C64,14 48,28 48,52 L48,80 L54,84 L54,76 L74,76 L74,84 L80,80 L80,52 C80,28 64,14 64,14 Z" 
              fill="url(#rocketBodyagents_documentarian)" />
        <!-- Left fin -->
        <polygon points="48,68 34,88 48,80" fill="url(#rocketBodyagents_documentarian)" />
        <!-- Right fin -->
        <polygon points="80,68 94,88 80,80" fill="url(#rocketBodyagents_documentarian)" />
        <!-- A cutout (negative space) -->
        <path d="M64,26 L55,62 L58,62 L61,52 L67,52 L70,62 L73,62 Z M62.5,47 L64,36 L65.5,47 Z" 
              fill="#ffffff" />
        <!-- Exhaust flame -->
        <polygon points="54,82 64,98 74,82" fill="url(#flameGradagents_documentarian)" />
    </g>

    <!-- Scroll bottom-left -->
    <g transform="translate(6, 56)">
        <rect x="4" y="0" width="30" height="26" rx="1" fill="#fbbf24" opacity="0.7"/>
        <ellipse cx="19" cy="0" rx="17" ry="3.5" fill="#fbbf24" opacity="0.9"/>
        <ellipse cx="19" cy="26" rx="17" ry="3.5" fill="#fbbf24" opacity="0.8"/>
        <line x1="8" y1="7" x2="30" y2="7" stroke="#f59e0b" stroke-width="1" opacity="0.4"/>
        <line x1="8" y1="12" x2="28" y2="12" stroke="#f59e0b" stroke-width="1" opacity="0.4"/>
        <line x1="8" y1="17" x2="26" y2="17" stroke="#f59e0b" stroke-width="1" opacity="0.4"/>
        <line x1="8" y1="22" x2="22" y2="22" stroke="#f59e0b" stroke-width="1" opacity="0.3"/>
    </g>
    <!-- Large quill pen top-right -->
    <g transform="translate(96, 8) rotate(25)">
        <path d="M0,0 L-4,30 L0,28 L4,30 Z" fill="#ffffff" opacity="0.9"/>
        <path d="M0,0 L-1.5,14 L1.5,14 Z" fill="#f59e0b" opacity="0.3"/>
        <line x1="-3" y1="6" x2="0" y2="4" stroke="#f59e0b" stroke-width="0.6" opacity="0.35"/>
        <line x1="3" y1="6" x2="0" y2="4" stroke="#f59e0b" stroke-width="0.6" opacity="0.35"/>
        <line x1="-3.5" y1="12" x2="0" y2="9" stroke="#f59e0b" stroke-width="0.6" opacity="0.35"/>
        <line x1="3.5" y1="12" x2="0" y2="9" stroke="#f59e0b" stroke-width="0.6" opacity="0.35"/>
        <line x1="0" y1="28" x2="0" y2="34" stroke="#f59e0b" stroke-width="1.5" opacity="0.6"/>
        <circle cx="2" cy="36" r="1.5" fill="#f59e0b" opacity="0.4"/>
        <circle cx="-1" cy="38" r="1" fill="#f59e0b" opacity="0.3"/>
    </g>
</g>
</g>
</svg>