      <text x="16" y="64" font-family="Segoe UI, sans-serif" font-size="10" fill="#a0a0a0">Heirs:</text>
      <text x="80" y="64" font-family="Segoe UI, sans-serif" font-size="10" fill="#e0e0e0">3 synced</text>
