      <text x="10" y="58" font-family="Segoe UI, sans-serif" font-size="9" fill="#b0b0b0">• No CI / pipeline integration</text>
      <text x="10" y="70" font-family="Segoe UI, sans-serif" font-size="9" fill="#b0b0b0">• Activity is just a text log</text>
