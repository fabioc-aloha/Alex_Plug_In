      <text x="26" y="34" font-family="Segoe UI, sans-serif" font-size="8" fill="#666666">10:42 — labeled 3 issues, closed 1 dupe</text>

      <circle cx="13" cy="54" r="5" fill="#22c55e"/>
      <text x="26" y="52" font-family="Segoe UI, sans-serif" font-size="9" fill="#e0e0e0">Dream State</text>
      <text x="26" y="64" font-family="Segoe UI, sans-serif" font-size="8" fill="#666666">03:00 — 4 synapses refreshed, 2 pruned</text>

