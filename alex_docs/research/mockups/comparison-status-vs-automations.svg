      <rect x="0" y="70" width="3" height="52" rx="1.5" fill="#3c3c3c"/>
      <text x="16" y="90" font-family="Segoe UI, sans-serif" font-size="11" fill="#e0e0e0">🔄 Heir Sync Check</text>
