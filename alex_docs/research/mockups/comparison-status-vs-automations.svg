      <text x="26" y="94" font-family="Segoe UI, sans-serif" font-size="8" fill="#f59e0b">09:30 — test failure in extension.test.ts</text>

      <circle cx="13" cy="114" r="5" fill="#22c55e"/>
      <text x="26" y="112" font-family="Segoe UI, sans-serif" font-size="9" fill="#e0e0e0">Heir Sync</text>
      <text x="26" y="124" font-family="Segoe UI, sans-serif" font-size="8" fill="#666666">06:00 — 3/3 heirs synced, 0 drift</text>
