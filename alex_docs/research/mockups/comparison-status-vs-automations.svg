    <!-- Annotations -->
    <g transform="translate(12, 652)">
      <rect x="0" y="0" width="296" height="92" rx="6" fill="rgba(34,197,94,0.08)" stroke="#22c55e" stroke-width="0.5" stroke-opacity="0.3"/>
      <text x="10" y="18" font-family="Segoe UI, sans-serif" font-size="10" fill="#22c55e" font-weight="600">NEW FROM CODEX</text>
      <text x="10" y="34" font-family="Segoe UI, sans-serif" font-size="9" fill="#b0b0b0">✦ Always-on background tasks with toggles</text>
