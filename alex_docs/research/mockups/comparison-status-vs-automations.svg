      <text x="10" y="58" font-family="Segoe UI, sans-serif" font-size="9" fill="#b0b0b0">✦ CI pipeline monitoring + fix suggestions</text>
      <text x="10" y="70" font-family="Segoe UI, sans-serif" font-size="9" fill="#b0b0b0">✦ Run history timeline with outcomes</text>
