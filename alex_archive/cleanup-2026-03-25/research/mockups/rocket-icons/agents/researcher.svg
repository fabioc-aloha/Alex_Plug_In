<svg xmlns="http://www.w3.org/2000/svg" viewBox="6 6 116 116" width="128" height="128">

    <defs>
        <linearGradient id="rocketBodyagents_researcher" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#38bdf8"/>
            <stop offset="100%" stop-color="#0284c7"/>
        </linearGradient>
        <linearGradient id="flameGradagents_researcher" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#fdba74"/>
            <stop offset="100%" stop-color="#f97316"/>
        </linearGradient>
    </defs>
<filter id="pop_agents_researcher" x="-5%" y="-5%" width="110%" height="110%">
    <feMorphology in="SourceAlpha" operator="dilate" radius="1.5" result="expanded"/>
    <feFlood flood-color="#0a0e1a" result="dark"/>
    <feComposite in="dark" in2="expanded" operator="in" result="outline"/>
    <feMerge>
        <feMergeNode in="outline"/>
        <feMergeNode in="SourceGraphic"/>
    </feMerge>
</filter>
<g filter="url(#pop_agents_researcher)">
<g transform="rotate(-10, 64, 64)">

    <g transform="translate(64,64) rotate(30) translate(-64,-64)">
        <!-- Rocket body -->
        <path d="M64,14 C64,14 48,28 48,52 L48,80 L54,84 L54,76 L74,76 L74,84 L80,80 L80,52 C80,28 64,14 64,14 Z" 
              fill="url(#rocketBodyagents_researcher)" />
        <!-- Left fin -->
        <polygon points="48,68 34,88 48,80" fill="url(#rocketBodyagents_researcher)" />
        <!-- Right fin -->
        <polygon points="80,68 94,88 80,80" fill="url(#rocketBodyagents_researcher)" />
        <!-- A cutout (negative space) -->
        <path d="M64,26 L55,62 L58,62 L61,52 L67,52 L70,62 L73,62 Z M62.5,47 L64,36 L65.5,47 Z" 
              fill="#ffffff" />
        <!-- Exhaust flame -->
        <polygon points="54,82 64,98 74,82" fill="url(#flameGradagents_researcher)" />
    </g>

    <g transform="translate(64,64) rotate(30) translate(-64,-64)">
        <!-- Fedora -->
        <path d="M42,24 Q44,28 54,28 Q64,29 74,28 Q84,28 86,24 Q84,22 74,21 Q64,20 54,21 Q44,22 42,24 Z" fill="#3b82f6" opacity="0.85"/>
        <path d="M52,22 Q52,10 58,6 L64,4 L70,6 Q76,10 76,22 Z" fill="#3b82f6"/>
        <path d="M56,10 Q60,14 64,10 Q68,14 72,10" stroke="#3b82f6" stroke-width="1.5" fill="none" opacity="0.5"/>
        <rect x="52" y="19" width="24" height="3" rx="1" fill="#1a1a1a" opacity="0.6"/>
    </g>
    <!-- Notebook bottom-left -->
    <g transform="translate(6, 64)">
        <rect x="0" y="0" width="30" height="24" rx="2" fill="#3b82f6" opacity="0.7"/>
        <line x1="7" y1="0" x2="7" y2="24" stroke="#ffffff" stroke-width="1" opacity="0.2"/>
        <line x1="10" y1="5" x2="26" y2="5" stroke="#ffffff" stroke-width="1" opacity="0.3"/>
        <line x1="10" y1="10" x2="24" y2="10" stroke="#ffffff" stroke-width="1" opacity="0.25"/>
        <line x1="10" y1="15" x2="22" y2="15" stroke="#ffffff" stroke-width="1" opacity="0.2"/>
        <circle cx="24" cy="20" r="4" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.3"/>
        <line x1="27" y1="23" x2="30" y2="26" stroke="#ffffff" stroke-width="1.5" opacity="0.3" stroke-linecap="round"/>
    </g>
    <!-- Test tube — bigger, right side -->
    <g transform="translate(100, 42) rotate(15)">
        <rect x="-5" y="0" width="10" height="32" rx="5" fill="none" stroke="#3b82f6" stroke-width="2.5" opacity="0.9"/>
        <rect x="-4" y="14" width="8" height="17" rx="4" fill="#3b82f6" opacity="0.55"/>
        <rect x="-6" y="-3" width="12" height="5" rx="2" fill="#3b82f6" opacity="0.7"/>
        <circle cx="0" cy="18" r="2" fill="#ffffff" opacity="0.5"/>
        <circle cx="2" cy="24" r="1.5" fill="#ffffff" opacity="0.35"/>
        <circle cx="-1" cy="12" r="1" fill="#ffffff" opacity="0.3"/>
    </g>
</g>
</g>
</svg>