<svg xmlns="http://www.w3.org/2000/svg" viewBox="6 6 116 116" width="128" height="128">

    <defs>
        <linearGradient id="rocketBodyagents_alex" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#38bdf8"/>
            <stop offset="100%" stop-color="#0284c7"/>
        </linearGradient>
        <linearGradient id="flameGradagents_alex" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#fdba74"/>
            <stop offset="100%" stop-color="#f97316"/>
        </linearGradient>
    </defs>
<filter id="pop_agents_alex" x="-5%" y="-5%" width="110%" height="110%">
    <feMorphology in="SourceAlpha" operator="dilate" radius="1.5" result="expanded"/>
    <feFlood flood-color="#0a0e1a" result="dark"/>
    <feComposite in="dark" in2="expanded" operator="in" result="outline"/>
    <feMerge>
        <feMergeNode in="outline"/>
        <feMergeNode in="SourceGraphic"/>
    </feMerge>
</filter>
<g filter="url(#pop_agents_alex)">


    <g transform="translate(64,64) rotate(30) translate(-64,-64)">
        <!-- Rocket body -->
        <path d="M64,14 C64,14 48,28 48,52 L48,80 L54,84 L54,76 L74,76 L74,84 L80,80 L80,52 C80,28 64,14 64,14 Z" 
              fill="url(#rocketBodyagents_alex)" />
        <!-- Left fin -->
        <polygon points="48,68 34,88 48,80" fill="url(#rocketBodyagents_alex)" />
        <!-- Right fin -->
        <polygon points="80,68 94,88 80,80" fill="url(#rocketBodyagents_alex)" />
        <!-- A cutout (negative space) -->
        <path d="M64,26 L55,62 L58,62 L61,52 L67,52 L70,62 L73,62 Z M62.5,47 L64,36 L65.5,47 Z" 
              fill="#ffffff" />
        <!-- Exhaust flame -->
        <polygon points="54,82 64,98 74,82" fill="url(#flameGradagents_alex)" />
    </g>

    <!-- Gold idea lightbulb — hero icon, left of rocket, slight tilt -->
    <g transform="translate(26, 24) rotate(-12)">
        <!-- Outer warm glow -->
        <circle cx="0" cy="-2" r="24" fill="#eab308" opacity="0.06"/>
        <circle cx="0" cy="-2" r="18" fill="#eab308" opacity="0.10"/>
        <circle cx="0" cy="-2" r="12" fill="#eab308" opacity="0.14"/>

        <!-- Classic bulb shape — rounded dome tapering to neck -->
        <path d="M0,-14 Q-11,-14 -11,-3 Q-11,4 -7,9 Q-5,12 -5,14 L5,14 Q5,12 7,9 Q11,4 11,-3 Q11,-14 0,-14 Z" fill="#eab308" opacity="0.9"/>

        <!-- Glass highlight arc -->
        <path d="M-5,-10 Q-2,-13 4,-9" stroke="#ffffff" stroke-width="1.6" fill="none" opacity="0.45" stroke-linecap="round"/>
        <!-- Secondary highlight -->
        <path d="M-6,-5 Q-5,-7 -3,-6" stroke="#ffffff" stroke-width="1" fill="none" opacity="0.3" stroke-linecap="round"/>

        <!-- Edison filament — W shape -->
        <path d="M-3,3 L-1.5,-2 L0,3 L1.5,-2 L3,3" stroke="#ffffff" stroke-width="1.2" fill="none" opacity="0.55" stroke-linecap="round" stroke-linejoin="round"/>
        <!-- Filament wires from base -->
        <line x1="-3" y1="3" x2="-3" y2="8" stroke="#ffffff" stroke-width="0.8" opacity="0.35"/>
        <line x1="3" y1="3" x2="3" y2="8" stroke="#ffffff" stroke-width="0.8" opacity="0.35"/>

        <!-- Screw base — 3 stepped rings -->
        <rect x="-5" y="14" width="10" height="3" rx="1.5" fill="#eab308" opacity="0.7"/>
        <rect x="-4.5" y="17" width="9" height="2.5" rx="1.2" fill="#eab308" opacity="0.55"/>
        <rect x="-3.5" y="19.5" width="7" height="2" rx="1" fill="#eab308" opacity="0.4"/>
        <!-- Contact point -->
        <circle cx="0" cy="22.5" r="1.5" fill="#eab308" opacity="0.35"/>

        <!-- Rays — 8-point starburst -->
        <line x1="0" y1="-22" x2="0" y2="-27" stroke="#eab308" stroke-width="2.2" opacity="0.5" stroke-linecap="round"/>
        <line x1="14" y1="-10" x2="18" y2="-13" stroke="#eab308" stroke-width="2" opacity="0.45" stroke-linecap="round"/>
        <line x1="-14" y1="-10" x2="-18" y2="-13" stroke="#eab308" stroke-width="2" opacity="0.45" stroke-linecap="round"/>
        <line x1="16" y1="2" x2="20" y2="3" stroke="#eab308" stroke-width="1.8" opacity="0.35" stroke-linecap="round"/>
        <line x1="-16" y1="2" x2="-20" y2="3" stroke="#eab308" stroke-width="1.8" opacity="0.35" stroke-linecap="round"/>
        <!-- Diagonal sparkle rays -->
        <line x1="10" y1="-18" x2="13" y2="-22" stroke="#eab308" stroke-width="1.6" opacity="0.35" stroke-linecap="round"/>
        <line x1="-10" y1="-18" x2="-13" y2="-22" stroke="#eab308" stroke-width="1.6" opacity="0.35" stroke-linecap="round"/>
        <line x1="15" y1="-4" x2="19" y2="-5" stroke="#eab308" stroke-width="1.4" opacity="0.28" stroke-linecap="round"/>
    </g>

</g>
</svg>