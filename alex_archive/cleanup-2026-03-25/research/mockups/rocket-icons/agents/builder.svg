<svg xmlns="http://www.w3.org/2000/svg" viewBox="6 6 116 116" width="128" height="128">

    <defs>
        <linearGradient id="rocketBodyagents_builder" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#38bdf8"/>
            <stop offset="100%" stop-color="#0284c7"/>
        </linearGradient>
        <linearGradient id="flameGradagents_builder" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#fdba74"/>
            <stop offset="100%" stop-color="#f97316"/>
        </linearGradient>
    </defs>
<filter id="pop_agents_builder" x="-5%" y="-5%" width="110%" height="110%">
    <feMorphology in="SourceAlpha" operator="dilate" radius="1.5" result="expanded"/>
    <feFlood flood-color="#0a0e1a" result="dark"/>
    <feComposite in="dark" in2="expanded" operator="in" result="outline"/>
    <feMerge>
        <feMergeNode in="outline"/>
        <feMergeNode in="SourceGraphic"/>
    </feMerge>
</filter>
<g filter="url(#pop_agents_builder)">
<g transform="rotate(15, 64, 64)">

    <g transform="translate(64,64) rotate(30) translate(-64,-64)">
        <!-- Rocket body -->
        <path d="M64,14 C64,14 48,28 48,52 L48,80 L54,84 L54,76 L74,76 L74,84 L80,80 L80,52 C80,28 64,14 64,14 Z" 
              fill="url(#rocketBodyagents_builder)" />
        <!-- Left fin -->
        <polygon points="48,68 34,88 48,80" fill="url(#rocketBodyagents_builder)" />
        <!-- Right fin -->
        <polygon points="80,68 94,88 80,80" fill="url(#rocketBodyagents_builder)" />
        <!-- A cutout (negative space) -->
        <path d="M64,26 L55,62 L58,62 L61,52 L67,52 L70,62 L73,62 Z M62.5,47 L64,36 L65.5,47 Z" 
              fill="#ffffff" />
        <!-- Exhaust flame -->
        <polygon points="54,82 64,98 74,82" fill="url(#flameGradagents_builder)" />
    </g>

    <g transform="translate(64,64) rotate(30) translate(-64,-64)">
        <!-- Hard hat brim -->
        <ellipse cx="64" cy="24" rx="16" ry="5" fill="#22c55e" opacity="0.9"/>
        <!-- Hard hat dome -->
        <path d="M52,24 Q52,12 64,10 Q76,12 76,24 Z" fill="#22c55e"/>
        <!-- Hat highlight -->
        <path d="M57,20 Q60,14 64,13 Q63,14 60,20 Z" fill="#ffffff" opacity="0.3"/>
    </g>
    <!-- Crossed wrench + hammer bottom-left -->
    <g transform="translate(16, 68)">
        <!-- Wrench -->
        <g transform="rotate(-30)">
            <rect x="-2" y="0" width="4" height="26" rx="1.5" fill="#22c55e" opacity="0.8"/>
            <path d="M-5,0 L-2,0 L-2,-5 L-5,-5 Z" fill="#22c55e" opacity="0.7"/>
            <path d="M2,0 L5,0 L5,-5 L2,-5 Z" fill="#22c55e" opacity="0.7"/>
            <rect x="-5" y="-5" width="10" height="2" rx="1" fill="#22c55e" opacity="0.6"/>
        </g>
        <!-- Hammer -->
        <g transform="rotate(30)">
            <rect x="-2" y="0" width="4" height="26" rx="1.5" fill="#22c55e" opacity="0.75"/>
            <rect x="-7" y="-5" width="14" height="7" rx="2" fill="#22c55e" opacity="0.9"/>
        </g>
    </g>
    <!-- Blueprint tube bottom-right -->
    <g transform="translate(94, 78) rotate(-10)">
        <rect x="-3" y="0" width="6" height="22" rx="3" fill="#3b82f6" opacity="0.65"/>
        <ellipse cx="0" cy="0" rx="4" ry="2" fill="#3b82f6" opacity="0.65"/>
        <rect x="-2" y="-4" width="4" height="5" rx="1" fill="#ffffff" opacity="0.35"/>
    </g>
</g>
</g>
</svg>