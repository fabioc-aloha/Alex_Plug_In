<svg xmlns="http://www.w3.org/2000/svg" viewBox="6 6 116 116" width="128" height="128">

    <defs>
        <linearGradient id="rocketBodyagents_m365" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#38bdf8"/>
            <stop offset="100%" stop-color="#0284c7"/>
        </linearGradient>
        <linearGradient id="flameGradagents_m365" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#fdba74"/>
            <stop offset="100%" stop-color="#f97316"/>
        </linearGradient>
    </defs>
<filter id="pop_agents_m365" x="-5%" y="-5%" width="110%" height="110%">
    <feMorphology in="SourceAlpha" operator="dilate" radius="1.5" result="expanded"/>
    <feFlood flood-color="#0a0e1a" result="dark"/>
    <feComposite in="dark" in2="expanded" operator="in" result="outline"/>
    <feMerge>
        <feMergeNode in="outline"/>
        <feMergeNode in="SourceGraphic"/>
    </feMerge>
</filter>
<g filter="url(#pop_agents_m365)">
<g transform="rotate(-5, 64, 64)">

    <g transform="translate(64,64) rotate(30) translate(-64,-64)">
        <!-- Rocket body -->
        <path d="M64,14 C64,14 48,28 48,52 L48,80 L54,84 L54,76 L74,76 L74,84 L80,80 L80,52 C80,28 64,14 64,14 Z" 
              fill="url(#rocketBodyagents_m365)" />
        <!-- Left fin -->
        <polygon points="48,68 34,88 48,80" fill="url(#rocketBodyagents_m365)" />
        <!-- Right fin -->
        <polygon points="80,68 94,88 80,80" fill="url(#rocketBodyagents_m365)" />
        <!-- A cutout (negative space) -->
        <path d="M64,26 L55,62 L58,62 L61,52 L67,52 L70,62 L73,62 Z M62.5,47 L64,36 L65.5,47 Z" 
              fill="#ffffff" />
        <!-- Exhaust flame -->
        <polygon points="54,82 64,98 74,82" fill="url(#flameGradagents_m365)" />
    </g>

    <g transform="translate(64,64) rotate(30) translate(-64,-64)">
        <!-- Headset band -->
        <path d="M50,34 Q50,18 64,16 Q78,18 78,34" stroke="#f97316" stroke-width="3.5" fill="none"/>
        <!-- Left ear cup -->
        <rect x="45" y="30" width="7" height="10" rx="2.5" fill="#f97316"/>
        <!-- Right ear cup -->
        <rect x="76" y="30" width="7" height="10" rx="2.5" fill="#f97316"/>
    </g>
    <!-- Teams chat bubble — foreground overlap -->
    <g transform="translate(64, 48)">
        <rect x="0" y="0" width="40" height="24" rx="10" fill="#f97316" opacity="0.9"/>
        <polygon points="4,24 12,24 2,34" fill="#f97316" opacity="0.9"/>
        <!-- Dots -->
        <circle cx="12" cy="12" r="3" fill="#ffffff" opacity="0.95"/>
        <circle cx="20" cy="12" r="3" fill="#ffffff" opacity="0.95"/>
        <circle cx="28" cy="12" r="3" fill="#ffffff" opacity="0.95"/>
    </g>
</g>
</g>
</svg>