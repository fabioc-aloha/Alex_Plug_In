<svg xmlns="http://www.w3.org/2000/svg" viewBox="6 6 116 116" width="128" height="128">

    <defs>
        <linearGradient id="rocketBodypersonas_design" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#38bdf8"/>
            <stop offset="100%" stop-color="#0284c7"/>
        </linearGradient>
        <linearGradient id="flameGradpersonas_design" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#fdba74"/>
            <stop offset="100%" stop-color="#f97316"/>
        </linearGradient>
    </defs>
<filter id="pop_personas_design" x="-5%" y="-5%" width="110%" height="110%">
    <feMorphology in="SourceAlpha" operator="dilate" radius="1.5" result="expanded"/>
    <feFlood flood-color="#0a0e1a" result="dark"/>
    <feComposite in="dark" in2="expanded" operator="in" result="outline"/>
    <feMerge>
        <feMergeNode in="outline"/>
        <feMergeNode in="SourceGraphic"/>
    </feMerge>
</filter>
<g filter="url(#pop_personas_design)">
<g transform="rotate(15, 64, 64)">

    <g transform="translate(64,64) rotate(30) translate(-64,-64)">
        <!-- Rocket body -->
        <path d="M64,14 C64,14 48,28 48,52 L48,80 L54,84 L54,76 L74,76 L74,84 L80,80 L80,52 C80,28 64,14 64,14 Z" 
              fill="url(#rocketBodypersonas_design)" />
        <!-- Left fin -->
        <polygon points="48,68 34,88 48,80" fill="url(#rocketBodypersonas_design)" />
        <!-- Right fin -->
        <polygon points="80,68 94,88 80,80" fill="url(#rocketBodypersonas_design)" />
        <!-- A cutout (negative space) -->
        <path d="M64,26 L55,62 L58,62 L61,52 L67,52 L70,62 L73,62 Z M62.5,47 L64,36 L65.5,47 Z" 
              fill="#ffffff" />
        <!-- Exhaust flame -->
        <polygon points="54,82 64,98 74,82" fill="url(#flameGradpersonas_design)" />
    </g>

    <!-- Color palette bottom-right -->
    <g transform="translate(76, 60)">
        <!-- Palette body -->
        <path d="M16,0 Q32,-2 34,12 Q36,26 22,30 Q10,34 2,26 Q-4,18 0,8 Q2,0 16,0Z" fill="#a855f7" opacity="0.8"/>
        <!-- Thumb hole -->
        <ellipse cx="10" cy="20" rx="4" ry="5" fill="#1e1e1e" opacity="0.9"/>
        <!-- Paint dots -->
        <circle cx="14" cy="6" r="3.5" fill="#f43f5e"/>
        <circle cx="24" cy="5" r="3" fill="#facc15"/>
        <circle cx="30" cy="12" r="3" fill="#4ade80"/>
        <circle cx="28" cy="22" r="3" fill="#38bdf8"/>
        <circle cx="18" cy="14" r="2.5" fill="#c084fc"/>
    </g>
</g>
</g>
</svg>