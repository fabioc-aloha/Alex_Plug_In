<svg xmlns="http://www.w3.org/2000/svg" viewBox="6 6 116 116" width="128" height="128">

    <defs>
        <linearGradient id="rocketBodypersonas_engineering" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#38bdf8"/>
            <stop offset="100%" stop-color="#0284c7"/>
        </linearGradient>
        <linearGradient id="flameGradpersonas_engineering" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#fdba74"/>
            <stop offset="100%" stop-color="#f97316"/>
        </linearGradient>
    </defs>
<filter id="pop_personas_engineering" x="-5%" y="-5%" width="110%" height="110%">
    <feMorphology in="SourceAlpha" operator="dilate" radius="1.5" result="expanded"/>
    <feFlood flood-color="#0a0e1a" result="dark"/>
    <feComposite in="dark" in2="expanded" operator="in" result="outline"/>
    <feMerge>
        <feMergeNode in="outline"/>
        <feMergeNode in="SourceGraphic"/>
    </feMerge>
</filter>
<g filter="url(#pop_personas_engineering)">
<g transform="rotate(10, 64, 64)">

    <g transform="translate(64,64) rotate(30) translate(-64,-64)">
        <!-- Rocket body -->
        <path d="M64,14 C64,14 48,28 48,52 L48,80 L54,84 L54,76 L74,76 L74,84 L80,80 L80,52 C80,28 64,14 64,14 Z" 
              fill="url(#rocketBodypersonas_engineering)" />
        <!-- Left fin -->
        <polygon points="48,68 34,88 48,80" fill="url(#rocketBodypersonas_engineering)" />
        <!-- Right fin -->
        <polygon points="80,68 94,88 80,80" fill="url(#rocketBodypersonas_engineering)" />
        <!-- A cutout (negative space) -->
        <path d="M64,26 L55,62 L58,62 L61,52 L67,52 L70,62 L73,62 Z M62.5,47 L64,36 L65.5,47 Z" 
              fill="#ffffff" />
        <!-- Exhaust flame -->
        <polygon points="54,82 64,98 74,82" fill="url(#flameGradpersonas_engineering)" />
    </g>
<!-- Big gear bottom-right -->
    <g transform="translate(86, 66)">
        <path d="M17.7,-3.5 L17.7,3.5 L12.8,2.5 L10.8,7.2L15.0,10.0 L10.0,15.0 L7.2,10.8 L2.5,12.8L3.5,17.7 L-3.5,17.7 L-2.5,12.8 L-7.2,10.8L-10.0,15.0 L-15.0,10.0 L-10.8,7.2 L-12.8,2.5L-17.7,3.5 L-17.7,-3.5 L-12.8,-2.5 L-10.8,-7.2L-15.0,-10.0 L-10.0,-15.0 L-7.2,-10.8 L-2.5,-12.8L-3.5,-17.7 L3.5,-17.7 L2.5,-12.8 L7.2,-10.8L10.0,-15.0 L15.0,-10.0 L10.8,-7.2 L12.8,-2.5Z" fill="#3b82f6" opacity="0.85"/>
        <circle cx="0" cy="0" r="6" fill="#0f172a" opacity="0.8"/>
    </g>
    <!-- Small interlocking gear -->
    <g transform="translate(104, 82) rotate(22.5)">
        <path d="M9.7,-2.6 L9.7,2.6 L6.8,1.8 L4.9,4.9L7.1,7.1 L2.6,9.7 L1.8,6.8 L-1.8,6.8L-2.6,9.7 L-7.1,7.1 L-4.9,4.9 L-6.8,1.8L-9.7,2.6 L-9.7,-2.6 L-6.8,-1.8 L-4.9,-4.9L-7.1,-7.1 L-2.6,-9.7 L-1.8,-6.8 L1.8,-6.8L2.6,-9.7 L7.1,-7.1 L4.9,-4.9 L6.8,-1.8Z" fill="#3b82f6" opacity="0.65"/>
        <circle cx="0" cy="0" r="3.5" fill="#0f172a" opacity="0.7"/>
    </g>
    <!-- Wrench top-left -->
    <g transform="translate(18, 24) rotate(-45)">
        <rect x="-2" y="0" width="4" height="22" rx="1.5" fill="#3b82f6" opacity="0.6"/>
        <path d="M-5,-1 L-2,-1 L-2,-5 L-5,-5 Z" fill="#3b82f6" opacity="0.55"/>
        <path d="M2,-1 L5,-1 L5,-5 L2,-5 Z" fill="#3b82f6" opacity="0.55"/>
        <rect x="-5" y="-5" width="10" height="2" rx="1" fill="#3b82f6" opacity="0.5"/>
    </g>
</g>
</g>
</svg>