<svg xmlns="http://www.w3.org/2000/svg" viewBox="6 6 116 116" width="128" height="128">

    <defs>
        <linearGradient id="rocketBodypersonas_healthcare" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#38bdf8"/>
            <stop offset="100%" stop-color="#0284c7"/>
        </linearGradient>
        <linearGradient id="flameGradpersonas_healthcare" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#fdba74"/>
            <stop offset="100%" stop-color="#f97316"/>
        </linearGradient>
    </defs>
<filter id="pop_personas_healthcare" x="-5%" y="-5%" width="110%" height="110%">
    <feMorphology in="SourceAlpha" operator="dilate" radius="1.5" result="expanded"/>
    <feFlood flood-color="#0a0e1a" result="dark"/>
    <feComposite in="dark" in2="expanded" operator="in" result="outline"/>
    <feMerge>
        <feMergeNode in="outline"/>
        <feMergeNode in="SourceGraphic"/>
    </feMerge>
</filter>
<g filter="url(#pop_personas_healthcare)">
<g transform="rotate(5, 64, 64)">

    <g transform="translate(64,64) rotate(30) translate(-64,-64)">
        <!-- Rocket body -->
        <path d="M64,14 C64,14 48,28 48,52 L48,80 L54,84 L54,76 L74,76 L74,84 L80,80 L80,52 C80,28 64,14 64,14 Z" 
              fill="url(#rocketBodypersonas_healthcare)" />
        <!-- Left fin -->
        <polygon points="48,68 34,88 48,80" fill="url(#rocketBodypersonas_healthcare)" />
        <!-- Right fin -->
        <polygon points="80,68 94,88 80,80" fill="url(#rocketBodypersonas_healthcare)" />
        <!-- A cutout (negative space) -->
        <path d="M64,26 L55,62 L58,62 L61,52 L67,52 L70,62 L73,62 Z M62.5,47 L64,36 L65.5,47 Z" 
              fill="#ffffff" />
        <!-- Exhaust flame -->
        <polygon points="54,82 64,98 74,82" fill="url(#flameGradpersonas_healthcare)" />
    </g>

    <!-- Large stethoscope — fills right side -->
    <g transform="translate(66, 30)">
        <circle cx="0" cy="0" r="4" fill="#ef4444" opacity="0.9"/>
        <circle cx="30" cy="0" r="4" fill="#ef4444" opacity="0.9"/>
        <path d="M0,4 Q-4,22 10,34 Q16,40 16,46" stroke="#ef4444" stroke-width="3" fill="none"/>
        <path d="M30,4 Q34,22 20,34 Q16,40 16,46" stroke="#ef4444" stroke-width="3" fill="none"/>
        <circle cx="16" cy="52" r="9" fill="#ef4444" opacity="0.9"/>
        <circle cx="16" cy="52" r="4" fill="#ffffff" opacity="0.25"/>
    </g>
    <!-- Heart + ECG top-left -->
    <g transform="translate(20, 30)">
        <path d="M0,-6 Q-9,-16 -13,-6 Q-13,2 0,12 Q13,2 13,-6 Q9,-16 0,-6" fill="#ef4444" opacity="0.65"/>
        <polyline points="-15,0 -7,0 -4,-7 0,9 4,-7 7,0 15,0" stroke="#ffffff" stroke-width="1.5" fill="none" opacity="0.5" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
</g>
</g>
</svg>