<svg xmlns="http://www.w3.org/2000/svg" viewBox="6 6 116 116" width="128" height="128">

    <defs>
        <linearGradient id="rocketBodypersonas_education" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#38bdf8"/>
            <stop offset="100%" stop-color="#0284c7"/>
        </linearGradient>
        <linearGradient id="flameGradpersonas_education" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#fdba74"/>
            <stop offset="100%" stop-color="#f97316"/>
        </linearGradient>
    </defs>
<filter id="pop_personas_education" x="-5%" y="-5%" width="110%" height="110%">
    <feMorphology in="SourceAlpha" operator="dilate" radius="1.5" result="expanded"/>
    <feFlood flood-color="#0a0e1a" result="dark"/>
    <feComposite in="dark" in2="expanded" operator="in" result="outline"/>
    <feMerge>
        <feMergeNode in="outline"/>
        <feMergeNode in="SourceGraphic"/>
    </feMerge>
</filter>
<g filter="url(#pop_personas_education)">
<g transform="rotate(-5, 64, 64)">

    <g transform="translate(64,64) rotate(30) translate(-64,-64)">
        <!-- Rocket body -->
        <path d="M64,14 C64,14 48,28 48,52 L48,80 L54,84 L54,76 L74,76 L74,84 L80,80 L80,52 C80,28 64,14 64,14 Z" 
              fill="url(#rocketBodypersonas_education)" />
        <!-- Left fin -->
        <polygon points="48,68 34,88 48,80" fill="url(#rocketBodypersonas_education)" />
        <!-- Right fin -->
        <polygon points="80,68 94,88 80,80" fill="url(#rocketBodypersonas_education)" />
        <!-- A cutout (negative space) -->
        <path d="M64,26 L55,62 L58,62 L61,52 L67,52 L70,62 L73,62 Z M62.5,47 L64,36 L65.5,47 Z" 
              fill="#ffffff" />
        <!-- Exhaust flame -->
        <polygon points="54,82 64,98 74,82" fill="url(#flameGradpersonas_education)" />
    </g>

    
    <g transform="translate(64,64) rotate(30) translate(-64,-64)">
        <!-- Mortarboard -->
        <polygon points="64,8 44,18 64,22 84,18" fill="#10b981"/>
        <!-- Board top -->
        <polygon points="44,18 64,14 84,18 64,22" fill="#10b981" opacity="0.8"/>
        <!-- Tassel -->
        <line x1="76" y1="14" x2="84" y2="24" stroke="#eab308" stroke-width="2" stroke-linecap="round"/>
        <circle cx="85" cy="26" r="2" fill="#eab308"/>
    </g>
    <!-- Open book bottom-left -->
    <g transform="translate(6, 66)">
        <path d="M16,-2 L0,2 L0,24 L16,20 Z" fill="#10b981" opacity="0.3"/>
        <path d="M16,-2 L32,2 L32,24 L16,20 Z" fill="#10b981" opacity="0.2"/>
        <path d="M16,0 L2,3 L2,22 L16,18 Z" fill="#ffffff" opacity="0.8"/>
        <path d="M16,0 L30,3 L30,22 L16,18 Z" fill="#ffffff" opacity="0.65"/>
        <line x1="16" y1="0" x2="16" y2="18" stroke="#10b981" stroke-width="1.5" opacity="0.5"/>
    </g>
    <!-- Large diploma scroll right -->
    <g transform="translate(76, 72)">
        <rect x="4" y="0" width="28" height="18" rx="1" fill="#ffffff" opacity="0.8"/>
        <ellipse cx="18" cy="0" rx="16" ry="3" fill="#ffffff" opacity="0.6"/>
        <ellipse cx="18" cy="18" rx="16" ry="3" fill="#ffffff" opacity="0.65"/>
        <circle cx="18" cy="9" r="4" fill="#10b981" opacity="0.7"/>
        <line x1="18" y1="13" x2="14" y2="18" stroke="#10b981" stroke-width="1.5" opacity="0.5"/>
        <line x1="18" y1="13" x2="22" y2="18" stroke="#10b981" stroke-width="1.5" opacity="0.5"/>
    </g>
</g>
</g>
</svg>