<svg xmlns="http://www.w3.org/2000/svg" viewBox="6 6 116 116" width="128" height="128">

    <defs>
        <linearGradient id="rocketBodypersonas_creative" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#38bdf8"/>
            <stop offset="100%" stop-color="#0284c7"/>
        </linearGradient>
        <linearGradient id="flameGradpersonas_creative" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#fdba74"/>
            <stop offset="100%" stop-color="#f97316"/>
        </linearGradient>
    </defs>
<filter id="pop_personas_creative" x="-5%" y="-5%" width="110%" height="110%">
    <feMorphology in="SourceAlpha" operator="dilate" radius="1.5" result="expanded"/>
    <feFlood flood-color="#0a0e1a" result="dark"/>
    <feComposite in="dark" in2="expanded" operator="in" result="outline"/>
    <feMerge>
        <feMergeNode in="outline"/>
        <feMergeNode in="SourceGraphic"/>
    </feMerge>
</filter>
<g filter="url(#pop_personas_creative)">
<g transform="rotate(-15, 64, 64)">

    <g transform="translate(64,64) rotate(30) translate(-64,-64)">
        <!-- Rocket body -->
        <path d="M64,14 C64,14 48,28 48,52 L48,80 L54,84 L54,76 L74,76 L74,84 L80,80 L80,52 C80,28 64,14 64,14 Z" 
              fill="url(#rocketBodypersonas_creative)" />
        <!-- Left fin -->
        <polygon points="48,68 34,88 48,80" fill="url(#rocketBodypersonas_creative)" />
        <!-- Right fin -->
        <polygon points="80,68 94,88 80,80" fill="url(#rocketBodypersonas_creative)" />
        <!-- A cutout (negative space) -->
        <path d="M64,26 L55,62 L58,62 L61,52 L67,52 L70,62 L73,62 Z M62.5,47 L64,36 L65.5,47 Z" 
              fill="#ffffff" />
        <!-- Exhaust flame -->
        <polygon points="54,82 64,98 74,82" fill="url(#flameGradpersonas_creative)" />
    </g>

    <!-- Canvas on easel bottom-left -->
    <g transform="translate(4, 52)">
        <!-- Easel legs -->
        <line x1="4" y1="36" x2="0" y2="50" stroke="#8b5cf6" stroke-width="1.5" opacity="0.5"/>
        <line x1="28" y1="36" x2="32" y2="50" stroke="#8b5cf6" stroke-width="1.5" opacity="0.5"/>
        <!-- Canvas frame -->
        <rect x="2" y="4" width="28" height="32" rx="1" fill="#1e293b" stroke="#8b5cf6" stroke-width="1.5" opacity="0.8"/>
        <!-- Color splashes on canvas -->
        <circle cx="10" cy="14" r="4" fill="#f43f5e" opacity="0.6"/>
        <circle cx="22" cy="12" r="3.5" fill="#38bdf8" opacity="0.6"/>
        <circle cx="16" cy="24" r="5" fill="#facc15" opacity="0.5"/>
        <circle cx="24" cy="28" r="3" fill="#4ade80" opacity="0.5"/>
        <circle cx="8" cy="30" r="2.5" fill="#8b5cf6" opacity="0.5"/>
    </g>
    <!-- Paintbrush held top-right -->
    <g transform="translate(96, 16) rotate(30)">
        <!-- Brush handle -->
        <rect x="-2" y="0" width="4" height="22" rx="1.5" fill="#8b5cf6" opacity="0.8"/>
        <!-- Ferrule -->
        <rect x="-2.5" y="22" width="5" height="4" rx="0.5" fill="#94a3b8" opacity="0.6"/>
        <!-- Bristles -->
        <path d="M-3,26 Q0,34 3,26" fill="#f43f5e" opacity="0.8"/>
    </g>
</g>
</g>
</svg>