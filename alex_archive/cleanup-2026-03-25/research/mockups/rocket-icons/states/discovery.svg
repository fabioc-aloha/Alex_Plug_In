<svg xmlns="http://www.w3.org/2000/svg" viewBox="6 6 116 116" width="128" height="128">

    <defs>
        <linearGradient id="rocketBodystates_discovery" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#38bdf8"/>
            <stop offset="100%" stop-color="#0284c7"/>
        </linearGradient>
        <linearGradient id="flameGradstates_discovery" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#fdba74"/>
            <stop offset="100%" stop-color="#f97316"/>
        </linearGradient>
    </defs>
<filter id="pop_states_discovery" x="-5%" y="-5%" width="110%" height="110%">
    <feMorphology in="SourceAlpha" operator="dilate" radius="1.5" result="expanded"/>
    <feFlood flood-color="#0a0e1a" result="dark"/>
    <feComposite in="dark" in2="expanded" operator="in" result="outline"/>
    <feMerge>
        <feMergeNode in="outline"/>
        <feMergeNode in="SourceGraphic"/>
    </feMerge>
</filter>
<g filter="url(#pop_states_discovery)">
<g transform="rotate(20, 64, 64)">

    <g transform="translate(64,64) rotate(30) translate(-64,-64)">
        <!-- Rocket body -->
        <path d="M64,14 C64,14 48,28 48,52 L48,80 L54,84 L54,76 L74,76 L74,84 L80,80 L80,52 C80,28 64,14 64,14 Z" 
              fill="url(#rocketBodystates_discovery)" />
        <!-- Left fin -->
        <polygon points="48,68 34,88 48,80" fill="url(#rocketBodystates_discovery)" />
        <!-- Right fin -->
        <polygon points="80,68 94,88 80,80" fill="url(#rocketBodystates_discovery)" />
        <!-- A cutout (negative space) -->
        <path d="M64,26 L55,62 L58,62 L61,52 L67,52 L70,62 L73,62 Z M62.5,47 L64,36 L65.5,47 Z" 
              fill="#ffffff" />
        <!-- Exhaust flame -->
        <polygon points="54,82 64,98 74,82" fill="url(#flameGradstates_discovery)" />
    </g>

    <g transform="translate(64,64) rotate(30) translate(-64,-64)">
        <!-- Fedora wide brim — curves down at front and back -->
        <path d="M42,24 Q44,28 54,28 Q64,29 74,28 Q84,28 86,24 Q84,22 74,21 Q64,20 54,21 Q44,22 42,24 Z" fill="#eab308" opacity="0.85"/>
        <!-- Crown with pinch -->
        <path d="M52,22 Q52,10 58,6 L64,4 L70,6 Q76,10 76,22 Z" fill="#eab308"/>
        <!-- Crown pinch dent -->
        <path d="M56,10 Q60,14 64,10 Q68,14 72,10" stroke="#eab308" stroke-width="1.5" fill="none" opacity="0.5"/>
        <!-- Dark hat band -->
        <rect x="52" y="19" width="24" height="3" rx="1" fill="#1a1a1a" opacity="0.6"/>
    </g>
    <!-- Flashlight beam -->
    <g>
        <!-- Beam cone -->
        <polygon points="90,58 118,38 118,78" fill="#eab308" opacity="0.12"/>
        <polygon points="90,58 114,42 114,74" fill="#eab308" opacity="0.08"/>
        <!-- Flashlight body -->
        <rect x="78" y="54" width="14" height="8" rx="2" fill="#eab308" opacity="0.8"/>
        <!-- Lens -->
        <rect x="91" y="55" width="3" height="6" rx="1" fill="#ffffff" opacity="0.4"/>
        <!-- Grip lines -->
        <line x1="81" y1="55" x2="81" y2="61" stroke="#ffffff" stroke-width="0.7" opacity="0.2"/>
        <line x1="84" y1="55" x2="84" y2="61" stroke="#ffffff" stroke-width="0.7" opacity="0.2"/>
    </g>
</g>
</g>
</svg>